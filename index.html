<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>نظام تتبع مظاريف الاختبارات</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #0D1F3C;
    --navyM:   #162D52;
    --navyL:   #1E3E6E;
    --gold:    #C8911F;
    --goldL:   #F0B429;
    --bg:      #EEF1F8;
    --white:   #FFFFFF;
    --border:  #D2D8E8;
    --text:    #0D1F3C;
    --mid:     #56607A;
    --muted:   #96A0B5;
    --green:   #15803D;
    --greenBg: #DCFCE7;
    --red:     #DC2626;
    --redBg:   #FEE2E2;
    --amber:   #D97706;
    --amberBg: #FEF3C7;
    --blue:    #2563EB;
    --blueBg:  #DBEAFE;
    --purple:  #7C3AED;
    --purBg:   #EDE9FE;
    --wa:      #25D366;
    --waBg:    #DCFCE7;
  }

  body {
    font-family: 'Tajawal', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* ── LOGIN ── */
  #loginScreen {
    min-height: 100vh;
    background: linear-gradient(145deg, var(--navy) 0%, var(--navyL) 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .loginBox {
    background: var(--white);
    border-radius: 20px;
    padding: 44px 36px;
    width: 360px;
    max-width: 100%;
    box-shadow: 0 28px 70px rgba(0,0,0,.35);
  }
  .loginLogo {
    text-align: center;
    margin-bottom: 28px;
  }
  .loginLogo .icon { font-size: 48px; display: block; margin-bottom: 8px; }
  .loginLogo h1 { font-size: 20px; font-weight: 900; color: var(--navy); }
  .loginLogo p  { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .demoRow {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; background: none; border: none;
    cursor: pointer; width: 100%; text-align: right;
  }
  .roleTag {
    padding: 2px 9px; border-radius: 10px;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .demoMono { font-size: 11px; color: var(--mid); font-family: monospace; }

  /* ── SHELL ── */
  #appShell { display: none; min-height: 100vh; flex-direction: column; }

  /* HEADER */
  #appHeader {
    background: var(--navy);
    padding: 0 20px;
    height: 54px;
    display: flex; align-items: center; gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
  }
  #appHeader .hLogo { font-size: 22px; }
  #appHeader .hTitle { color: #fff; font-weight: 900; font-size: 15px; flex: 1; }
  #appHeader .hRole {
    padding: 3px 11px; border-radius: 12px;
    font-size: 11px; font-weight: 700;
  }
  #appHeader .hUser { color: #8AABCF; font-size: 12px; }
  #appHeader .hLogout {
    background: none; border: none; color: #EF4444;
    cursor: pointer; font-size: 12px; font-family: 'Tajawal', sans-serif;
    font-weight: 700; padding: 4px 8px;
  }

  /* NAV */
  #appNav {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex; padding: 0 14px; gap: 2px;
    overflow-x: auto; flex-shrink: 0;
  }
  #appNav::-webkit-scrollbar { height: 0; }
  .navBtn {
    padding: 12px 15px;
    border: none;
    border-bottom: 3px solid transparent;
    background: none; cursor: pointer;
    color: var(--muted);
    font-weight: 400; font-size: 13px;
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
    font-family: 'Tajawal', sans-serif;
    transition: all .15s;
  }
  .navBtn.active {
    color: var(--navy);
    font-weight: 800;
    border-bottom-color: var(--gold);
  }

  /* MAIN */
  #appMain { flex: 1; padding: 20px; overflow-y: auto; }
  .pageWrap { max-width: 720px; margin: 0 auto; }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
    margin-bottom: 14px;
  }
  .cardTitle {
    font-size: 15px; font-weight: 800;
    color: var(--navy); margin-bottom: 14px;
  }

  /* ── FORM ELEMENTS ── */
  .inp {
    width: 100%; padding: 9px 11px;
    border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 13px;
    outline: none; background: #fff;
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    transition: border-color .15s;
  }
  .inp:focus { border-color: var(--navyL); }
  .inp[dir="ltr"] { direction: ltr; font-family: monospace; }
  textarea.inp { resize: vertical; line-height: 1.6; }
  label.lbl { font-size: 12px; color: var(--mid); display: block; margin-bottom: 5px; }

  .btn {
    padding: 9px 20px;
    border: none; border-radius: 8px;
    cursor: pointer; font-size: 13px;
    font-weight: 700;
    font-family: 'Tajawal', sans-serif;
    color: #fff; transition: opacity .15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: .88; }
  .btn:active { opacity: .75; }
  .btn-navy   { background: var(--navy); }
  .btn-green  { background: var(--green); }
  .btn-red    { background: var(--red); }
  .btn-mid    { background: var(--mid); }
  .btn-wa     { background: var(--wa); }
  .btn-full   { width: 100%; font-size: 14px; padding: 12px; }
  .btn-sm     { padding: 5px 12px; font-size: 11px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    padding: 11px 28px; border-radius: 12px;
    color: #fff; font-weight: 700; font-size: 14px;
    z-index: 9999; box-shadow: 0 6px 24px rgba(0,0,0,.25);
    pointer-events: none; opacity: 0;
    transition: opacity .25s;
    font-family: 'Tajawal', sans-serif;
  }
  #toast.show { opacity: 1; }

  /* ── TAGS ── */
  .tag {
    padding: 2px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
    display: inline-block;
  }

  /* ── GRID HELPERS ── */
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .row { display: flex; gap: 8px; align-items: center; }

  /* ── INFO GRID ── */
  .infoGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .infoCell {
    background: var(--bg); border-radius: 8px; padding: 9px 12px;
  }
  .infoCell .k { font-size: 10px; color: var(--muted); }
  .infoCell .v { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 2px; }

  /* ── STAGE HEADER ── */
  .stageHeader {
    border-radius: 10px; padding: 16px 18px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 14px;
  }
  .stageHeader .bc {
    color: rgba(255,255,255,.7); font-size: 11px;
  }
  .stageHeader .bcode {
    color: #fff; font-family: monospace;
    font-size: 18px; font-weight: 900;
    letter-spacing: 2px; margin: 2px 0 8px;
  }
  .stagePill {
    background: rgba(255,255,255,.2);
    display: inline-block; border-radius: 20px;
    padding: 4px 13px;
    color: #fff; font-weight: 700; font-size: 13px;
  }

  /* ── PROGRESS STRIP ── */
  .progressWrap { margin-bottom: 14px; }
  .progressLabel {
    display: flex; justify-content: space-between;
    margin-bottom: 5px; font-size: 11px; color: var(--muted);
  }
  .progressStrip { display: flex; gap: 2px; }
  .progressSeg {
    flex: 1; height: 8px; border-radius: 4px;
    background: var(--border); transition: background .3s;
  }

  /* ── STAGE LIST ── */
  .stageItem {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 9px;
    border: 1.5px solid var(--border);
    background: #fff; cursor: pointer;
    margin-bottom: 6px; transition: all .15s;
    font-family: 'Tajawal', sans-serif;
    width: 100%; text-align: right;
  }
  .stageItem:hover:not(:disabled) { transform: translateX(-2px); }
  .stageItem:disabled { cursor: default; opacity: .65; }
  .stageNum {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; font-weight: 800;
    flex-shrink: 0;
  }
  .stageItemLabel {
    flex: 1; font-size: 13px; color: var(--mid);
  }
  .stageDoneMark { font-size: 12px; color: var(--green); }
  .stageNextTag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 10px; font-weight: 700;
  }

  /* ── CONFIRM BOX ── */
  .confirmBox {
    border-radius: 10px; padding: 16px;
    border: 2px solid var(--border);
  }
  .confirmHighlight {
    border-radius: 8px; padding: 12px 14px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .confirmNum {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; flex-shrink: 0;
  }

  /* ── LOG ── */
  .logEntry {
    display: flex; gap: 10px; margin-bottom: 9px;
    align-items: flex-start;
  }
  .logDot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
  }
  .logLabel { font-size: 12px; font-weight: 700; color: var(--text); }
  .logMeta  { font-size: 11px; color: var(--muted); margin-right: 5px; }
  .logNote  { font-size: 11px; color: var(--mid); font-style: italic; margin-top: 1px; }

  /* ── BUNDLE CARD ── */
  .bundleCard {
    background: var(--white); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; transition: box-shadow .15s;
  }
  .bundleCard:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
  .bundleIcon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .bundleInfo { flex: 1; min-width: 0; }
  .bundleName { font-weight: 800; color: var(--navy); font-size: 14px; }
  .bundleMeta { font-size: 11px; color: var(--muted); margin: 2px 0 6px; }
  .bundleProgress { display: flex; align-items: center; gap: 6px; }
  .progressBar { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progressFill { height: 100%; border-radius: 3px; transition: width .3s; }
  .bundleStageBadge {
    border: 1px solid; padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700; text-align: center;
    max-width: 140px; flex-shrink: 0; white-space: nowrap;
  }
  .bundleActions { display: flex; gap: 6px; align-items: center; }

  /* ── TEACHER ROW ── */
  .teacherRow {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 9px;
    border: 1.5px solid var(--border); background: #fff;
    cursor: pointer; margin-bottom: 5px;
    transition: all .15s; font-family: 'Tajawal', sans-serif;
    width: 100%; text-align: right;
  }
  .teacherRow.selected {
    border-color: var(--navy);
    background: rgba(13,31,60,.08);
  }
  .teacherAvatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 13px; font-weight: 800;
    flex-shrink: 0;
  }

  /* ── NOTIF TYPE BTNS ── */
  .ntypeBtn {
    padding: 8px 12px; border-radius: 8px;
    border: 2px solid var(--border); background: #fff;
    cursor: pointer; font-size: 12px; font-weight: 400;
    display: inline-flex; align-items: center; gap: 5px;
    font-family: 'Tajawal', sans-serif;
    transition: all .15s;
  }
  .ntypeBtn.active { font-weight: 800; }

  /* ── NOTIF LOG CARD ── */
  .nlogCard {
    background: var(--white); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    border-right: 4px solid var(--border);
  }

  /* ── QR SVG (inline) ── */
  .qrWrap { display: flex; justify-content: center; margin-bottom: 10px; }
  .qrWrap svg { border: 2px solid var(--navy); border-radius: 6px; display: block; }

  /* ── SETTINGS TABS ── */
  .settingsTabs {
    display: flex; gap: 2px; background: var(--white);
    border-radius: 10px; padding: 4px; margin-bottom: 14px;
    border: 1px solid var(--border); flex-wrap: wrap;
  }
  .sTab {
    flex: 1; min-width: 44px; padding: 7px 4px;
    border: none; border-radius: 7px;
    background: transparent; color: var(--mid);
    cursor: pointer; font-size: 13px; font-weight: 400;
    font-family: 'Tajawal', sans-serif; transition: all .15s;
  }
  .sTab.active { background: var(--navy); color: #fff; font-weight: 700; }

  /* ── LIST ITEM ── */
  .listItem {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border-radius: 8px;
    padding: 9px 12px; margin-bottom: 6px;
  }
  .listItem .liText { flex: 1; font-size: 13px; color: var(--navy); }
  .delBtn {
    background: none; border: none; cursor: pointer;
    color: var(--red); font-size: 18px; line-height: 1;
    padding: 0 4px;
  }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; color: var(--muted); padding: 32px 0; font-size: 14px; }

  /* ── DIVIDER ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* ── MODALS / OVERLAYS ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 500; display: flex; align-items: center;
    justify-content: center; padding: 20px;
  }
  .modal {
    background: var(--white); border-radius: 16px;
    padding: 24px; width: 100%; max-width: 400px;
    box-shadow: 0 16px 48px rgba(0,0,0,.3);
  }
  .modalTitle { font-size: 16px; font-weight: 800; color: var(--navy); margin-bottom: 14px; }

  /* ── RESPONSIVE ── */
  @media(max-width:480px) {
    .g2,.g3 { grid-template-columns: 1fr; }
    .infoGrid { grid-template-columns: 1fr; }
    .loginBox { padding: 32px 22px; }
    .card { padding: 14px; }
  }

  /* ── PRINT ── */
  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea { position: fixed; top: 0; left: 0; right: 0; text-align: center; padding: 40px; }
  }
</style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="loginScreen">
  <div class="loginBox">
    <div class="loginLogo">
      <span class="icon">📦</span>
      <h1 id="loginSchoolName">مدرسة النموذجية الثانوية</h1>
      <p>نظام تتبع مظاريف الاختبارات</p>
    </div>
    <div id="loginErr" style="display:none;background:var(--redBg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12px;margin-bottom:12px;"></div>
    <div style="margin-bottom:10px">
      <input class="inp" id="loginUser" placeholder="اسم المستخدم" autocomplete="username"/>
    </div>
    <div style="margin-bottom:16px">
      <input class="inp" id="loginPass" placeholder="كلمة المرور" type="password" dir="ltr" autocomplete="current-password"/>
    </div>
    <button class="btn btn-navy btn-full" onclick="doLogin()">دخول</button>
    <hr class="divider"/>
    <p style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:8px">الحسابات التجريبية</p>
    <div id="demoBtns"></div>
  </div>
</div>

<!-- ══════════════════ APP SHELL ══════════════════ -->
<div id="appShell">
  <header id="appHeader">
    <span class="hLogo">📦</span>
    <span class="hTitle" id="hSchool"></span>
    <span class="hRole" id="hRole"></span>
    <span class="hUser" id="hUser"></span>
    <button class="hLogout" onclick="doLogout()">خروج 🚪</button>
  </header>
  <nav id="appNav"></nav>
  <div id="appMain"><div class="pageWrap" id="pageContent"></div></div>
</div>

<!-- ══════════════════ TOAST ══════════════════ -->
<div id="toast"></div>

<!-- ══════════════════ PRINT AREA ══════════════════ -->
<div id="printArea" style="display:none"></div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const PALETTE = ["#3B82F6","#8B5CF6","#06B6D4","#F59E0B","#EF4444","#10B981","#F97316","#22C55E","#A855F7","#6366F1","#14B8A6","#64748B"];

let currentPage = "";

const ROLE_LABEL  = { admin:"مدير النظام", controller:"الكنترول", notifier:"مسؤول التنبيهات" };
const ROLE_COLORS = { admin:["#C8911F","#FEF3C7"], controller:["#2563EB","#DBEAFE"], notifier:["#7C3AED","#EDE9FE"] };

const NOTIFY_TYPES = [
  { key:"correction", label:"طلب تصحيح",   icon:"✏️", color:"#EF4444" },
  { key:"review",     label:"طلب مراجعة",  icon:"🔍", color:"#F97316" },
  { key:"audit",      label:"طلب تدقيق",   icon:"🔏", color:"#8B5CF6" },
  { key:"urgent",     label:"مراجعة عاجلة",icon:"🚨", color:"#DC2626" },
  { key:"info",       label:"إشعار عام",   icon:"ℹ️", color:"#2563EB" },
];
const PAGES = {
  admin:      [ {k:"admin_new", icon:"➕", label:"مظروف جديد"}, {k:"admin_list",icon:"📦",label:"المظاريف"}, {k:"settings",icon:"⚙️",label:"الإعدادات"} ],
  controller: [ {k:"ctrl_scan",icon:"📷",label:"مسح الباركود"}, {k:"ctrl_list",icon:"📋",label:"المظاريف"}, {k:"ctrl_schedule",icon:"📅",label:"جدول الاختبارات"}, {k:"ctrl_report",icon:"📄",label:"تقارير PDF"} ],
  notifier:   [ {k:"notif_send",icon:"📲",label:"إرسال تنبيه"}, {k:"notif_log",icon:"📜",label:"سجل التنبيهات"} ],

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function uid()    { return Math.random().toString(36).slice(2,8).toUpperCase(); }
function nowISO() { return new Date().toISOString(); }
function fmt(iso) { try { return new Date(iso).toLocaleString("ar-SA",{dateStyle:"short",timeStyle:"short"}); } catch(e){ return iso; } }

let _toastTimer;
function toast(msg, type="ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.background = type==="err" ? "var(--red)" : type==="wa" ? "var(--wa)" : "var(--green)";
  el.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove("show"), 3200);
}

function makeQR(value, size=130) {
  const h = value.split("").reduce((a,c)=>(a*31+c.charCodeAt(0))|0,0);
  const N=9, cell=Math.floor(size/N);
  const sz = cell*N;
  let rects = `<rect width="${sz}" height="${sz}" fill="#fff"/>`;
  for(let k=0;k<N*N;k++){
    const r=Math.floor(k/N), c=k%N;
    const corner=(r<3&&c<3)||(r<3&&c>5)||(r>5&&c<3);
    if(corner||!!(Math.abs(h)>>(k%29)&1))
      rects+=`<rect x="${c*cell}" y="${r*cell}" width="${cell}" height="${cell}" fill="#111"/>`;
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz}">${rects}</svg>`;
}

function phoneToWA(phone) {
  return phone.replace(/[^\d]/g,"");
}
function waLink(phone, msg) {
  const num = phoneToWA(phone);
  const enc = encodeURIComponent(msg);
  return `https://wa.me/${num}?text=${enc}`;
}

// PERSISTENCE — localStorage
// ═══════════════════════════════════════════════
const STORAGE_KEY = "examTrackerState_v1";

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { console.warn("saveState failed:", e); }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    // Merge saved into state (keep defaults for any missing keys)
    Object.keys(saved).forEach(k => { state[k] = saved[k]; });
  } catch(e) { console.warn("loadState failed:", e); }
}

// Wrap every state-mutating action with auto-save
// We intercept via a Proxy so every assignment triggers save
function makePersistent(obj) {
  return new Proxy(obj, {
    set(target, prop, value) {
      target[prop] = value;
      saveState();
      return true;
    }
  });
}

function renderLoginDemos() {
  const c = document.getElementById("demoBtns");
  c.innerHTML = "";
  state.users.forEach(u => {
    const [col,bg] = ROLE_COLORS[u.role]||["#888","#eee"];
    const btn = document.createElement("button");
    btn.className = "demoRow";
    btn.onclick = () => { document.getElementById("loginUser").value=u.username; document.getElementById("loginPass").value=u.password; };
    btn.innerHTML = `<span class="roleTag" style="background:${bg};color:${col}">${ROLE_LABEL[u.role]||u.role}</span><span class="demoMono">${u.username} / ${u.password}</span>`;
    c.appendChild(btn);
  });
  document.getElementById("loginSchoolName").textContent = state.schoolName;
}

function doLogin() {
  const u = document.getElementById("loginUser").value.trim();
  const p = document.getElementById("loginPass").value;
  const found = state.users.find(x=>x.username===u&&x.password===p);
  const errEl = document.getElementById("loginErr");
  if(found) {
    currentUser = found; errEl.style.display="none";
    document.getElementById("loginScreen").style.display="none";
    const shell = document.getElementById("appShell");
    shell.style.display="flex";
    document.getElementById("hSchool").textContent = state.schoolName;
    const [col,bg] = ROLE_COLORS[found.role]||["#888","#eee"];
    document.getElementById("hRole").textContent = ROLE_LABEL[found.role]||found.role;
    document.getElementById("hRole").style.cssText = `background:${bg};color:${col}`;
    document.getElementById("hUser").textContent = found.name;
    renderNav();
    const defaultPage = PAGES[found.role]?.[0]?.k || "ctrl_scan";
    navigateTo(defaultPage);
  } else {
    errEl.textContent="بيانات الدخول غير صحيحة";
    errEl.style.display="block";
  }
}

document.addEventListener("keydown", e => {
  if(e.key==="Enter" && !currentUser) doLogin();
});

function doLogout() {
  currentUser=null; currentPage="";
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("appShell").style.display="none";
  document.getElementById("loginUser").value="";
  document.getElementById("loginPass").value="";
  document.getElementById("loginErr").style.display="none";
}

function renderNav() {
  const nav = document.getElementById("appNav");
  nav.innerHTML = "";
  (PAGES[currentUser.role]||[]).forEach(p=>{
    const btn = document.createElement("button");
    btn.className = "navBtn" + (currentPage===p.k?" active":"");
    btn.innerHTML = `${p.icon} ${p.label}`;
    btn.onclick = () => navigateTo(p.k);
    nav.appendChild(btn);
  });
}

function navigateTo(page) {
  currentPage = page;
  renderNav();
  const el = document.getElementById("pageContent");
  // reset scroll
  document.getElementById("appMain").scrollTop=0;
  // render page
  switch(page) {
    case "admin_new":   renderAdminNew(el);    break;
    case "admin_list":  renderAdminList(el);   break;
    case "settings":    renderSettings(el);    break;
    case "ctrl_scan":   renderCtrlScan(el);    break;
    case "ctrl_list":   renderCtrlList(el);    break;
    case "notif_send":  renderNotifSend(el);   break;
    case "notif_log":    renderNotifLog(el);      break;
    case "ctrl_schedule":renderCtrlSchedule(el);  break;
    case "ctrl_report":  renderCtrlReport(el);    break;
    default: el.innerHTML="<p class='empty'>الصفحة غير موجودة</p>";
  }
}

  const examDate  = document.getElementById("bf_examdate")?.value||"";

  const examEnd   = document.getElementById("bf_end")?.value||"";

  if(!count||isNaN(count)||+count<1) { toast("أدخل عدد الأوراق","err"); return; }

      <input class="inp" id="scanInput" placeholder="أدخل رقم الباركود..." dir="ltr" style="flex:1;font-family:monospace;font-size:15px;letter-spacing:1px" autofocus/>
      <button class="btn btn-navy" onclick="doScan()">مسح ◀</button>
    </div>
    ${state.bundles.length?`
    <p style="font-size:11px;color:var(--muted);margin-bottom:6px">اختر للاختبار السريع:</p>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px">
      ${state.bundles.map(b=>`<button onclick="quickScan('${b.id}')" style="padding:3px 9px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;color:var(--mid);font-family:monospace">${b.barcode}</button>`).join("")}
    </div>`:""}
    <div id="scanErr"></div>
  </div>
  <div id="scanResult"></div>`;

  document.getElementById("scanInput").addEventListener("keydown", e=>{ if(e.key==="Enter") doScan(); });
  if(_scanHit) renderScanResult();
}

function quickScan(id) {
  const b = state.bundles.find(x=>x.id===id);
  if(!b)return;
  _scanHit=b; _confirmStg=null;
  const inp=document.getElementById("scanInput");
  if(inp) inp.value=b.barcode;
  renderScanResult();
}

function doScan() {
  const v = (document.getElementById("scanInput")||{value:""}).value.trim();
  if(!v)return;
  const b = state.bundles.find(x=>x.barcode===v);
  const errEl = document.getElementById("scanErr");
  if(!b) {
    _scanHit=null;
    if(errEl) errEl.innerHTML=`<p style="color:var(--red);font-weight:700;font-size:13px;margin-top:8px">⚠️ لا يوجد مظروف بالرقم: ${v}</p>`;
    document.getElementById("scanResult").innerHTML="";
    return;
  }
  if(errEl) errEl.innerHTML="";
  _scanHit=b; _confirmStg=null;
  renderScanResult();
}

function renderScanResult() {
  const container=document.getElementById("scanResult");
  if(!container||!_scanHit)return;
  const b=_scanHit;
  const color = b.stage<0?"var(--navyL)":sc(b.stage);
  const corrT = state.teachers.find(t=>t.id===b.corrector);
  const revT  = state.teachers.find(t=>t.id===b.reviewer);
  const audT  = state.teachers.find(t=>t.id===b.auditor);
  const pct   = state.stages.length ? Math.max(0,Math.round(((b.stage+1)/state.stages.length)*100)) : 0;
  const logHTML = [...b.log].reverse().map(e=>`
    <div class="logEntry">
      <div class="logDot" style="background:${sc(e.stageIdx)}"></div>
      <div>
        <span class="logLabel">${e.stageLabel}</span>
        <span class="logMeta">${fmt(e.ts)} — ${e.user}</span>
        ${e.note?`<p class="logNote">"${e.note}"</p>`:""}
      </div>
    </div>`).join("");

  container.innerHTML=`
  <div class="card">
    <!-- Stage header -->
    <div class="stageHeader" style="background:${color}">
      <div style="font-size:34px">📦</div>
      <div style="flex:1">
        <p class="bc">باركود المظروف</p>
        <p class="bcode">${b.barcode}</p>
        <span class="stagePill">${b.stage<0?"🆕 جديد — لم تبدأ المراحل بعد":state.stages[b.stage]||"—"}</span>
      </div>
    </div>
    <!-- Info -->
    <div class="infoGrid">
      <div class="infoCell"><p class="k">المادة</p><p class="v">${b.subject}</p></div>
      <div class="infoCell"><p class="k">الصف</p><p class="v">${b.grade||"—"}</p></div>
      <div class="infoCell"><p class="k">عدد الأوراق</p><p class="v">${b.count} ورقة</p></div>
      <div class="infoCell"><p class="k">تاريخ الإنشاء</p><p class="v">${fmt(b.created)}</p></div>
      <div class="infoCell"><p class="k">✏️ المصحح</p><p class="v">${corrT?corrT.name:"—"}</p></div>
      <div class="infoCell"><p class="k">🔍 المراجع</p><p class="v">${revT?revT.name:"—"}</p></div>
      <div class="infoCell"><p class="k">🔏 المدقق</p><p class="v">${audT?audT.name:"—"}</p></div>
      ${b.note?`<div class="infoCell"><p class="k">ملاحظة</p><p class="v">${b.note}</p></div>`:""}
      ${b.examDate?`<div class="infoCell"><p class="k">📅 يوم الاختبار</p><p class="v">${b.examDay||""} ${b.examDate}</p></div>`:""}
      ${b.examStart?`<div class="infoCell"><p class="k">⏰ وقت الاختبار</p><p class="v">${b.examStart}${b.examEnd?" — "+b.examEnd:""}</p></div>`:""}
      ${b.examHall?`<div class="infoCell"><p class="k">🏫 القاعة</p><p class="v">${b.examHall}</p></div>`:""}
    </div>
    <!-- Progress -->
    <div class="progressWrap">
      <div class="progressLabel"><span>مسار الأوراق</span><span style="font-weight:700;color:var(--navy)">${Math.max(0,b.stage+1)} / ${state.stages.length}</span></div>
      <div class="progressStrip">
        ${state.stages.map((_,i)=>`<div class="progressSeg" title="${state.stages[i]}" style="background:${i<=b.stage?sc(i):"var(--border)"}"></div>`).join("")}
      </div>
    </div>
    <!-- Stage selector / confirm -->
    <div id="stageSelectorArea"></div>
    <!-- Log -->
    ${b.log.length?`<hr class="divider"><p style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">سجل الحركة</p>${logHTML}`:""}
  </div>`;
  renderStageSelector();
}

function renderStageSelector() {
  const area=document.getElementById("stageSelectorArea");
  if(!area||!_scanHit)return;
  const b=_scanHit;
  if(_confirmStg!==null) {
    const idx=_confirmStg;
    const c=sc(idx);
    area.innerHTML=`
    <div class="confirmBox" style="border-color:${c}">
      <p style="font-weight:800;font-size:14px;color:var(--navy);margin-bottom:4px">تأكيد تحديث المرحلة</p>
      <p style="font-size:12px;color:var(--mid);margin-bottom:12px">سيتم تحديث المظروف <strong>${b.barcode}</strong> إلى:</p>
      <div class="confirmHighlight" style="background:${c}15;border:1px solid ${c}40">
        <div class="confirmNum" style="background:${c}">${idx+1}</div>
        <span style="font-weight:800;color:${c};font-size:14px">${state.stages[idx]}</span>
      </div>
      <input class="inp" id="stageNote" placeholder="ملاحظة (اختياري)" style="margin-bottom:10px"/>
      <div class="row">
        <button class="btn" style="flex:1;background:${c}" onclick="doAdvance()">✅ تأكيد التحديث</button>
        <button class="btn btn-mid" style="flex:1" onclick="_confirmStg=null;renderStageSelector()">إلغاء</button>
      </div>
    </div>`;
    return;
  }
  let html=`<p style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">اختر المرحلة الجديدة للمظروف:</p>`;
  state.stages.forEach((s,i)=>{
    const done=i<=b.stage;
    const next=i===b.stage+1;
    const c=sc(i);
    html+=`<button class="stageItem"
      style="${done?`border-color:var(--border);background:var(--bg);`:next?`border-color:${c};background:${c}15`:""}"
      ${done?"disabled":""}
      onclick="if(!this.disabled){_confirmStg=${i};renderStageSelector()}">
      <div class="stageNum" style="background:${done?"var(--green)":next?c:"var(--border)"}">${done?"✓":i+1}</div>
      <span class="stageItemLabel" style="${done?"color:var(--muted)":next?`color:${c};font-weight:700`:"color:var(--mid)"}">${s}</span>
      ${next?`<span class="stageNextTag" style="background:${c}20;color:${c}">التالية</span>`:""}
      ${done?`<span class="stageDoneMark">✓</span>`:""}
    </button>`;
  });
  area.innerHTML=html;
}

function doAdvance() {
  if(_confirmStg===null||!_scanHit)return;
  const idx=_confirmStg;
  const note=document.getElementById("stageNote")?.value||"";
  const entry={stageIdx:idx, stageLabel:state.stages[idx], ts:nowISO(), user:currentUser.name, note};
  const b=state.bundles.find(x=>x.id===_scanHit.id);
  if(!b)return;
  b.stage=idx; b.log.push(entry);
  saveState();
  _scanHit=b; _confirmStg=null;
  toast(`✅ ${state.stages[idx]}`);
  renderScanResult();
}

function renderCtrlList(el) {
  if(state.bundles.length===0){ el.innerHTML=`<div class="card"><p class="empty">لا توجد مظاريف حتى الآن</p></div>`; return; }
  el.innerHTML=`<div id="ctrlBundleList"></div>`;
  const container=document.getElementById("ctrlBundleList");
  state.bundles.forEach(b=>{
    const stageName=b.stage<0?"🆕 جديد":state.stages[b.stage]||"—";
    const color=b.stage<0?"var(--muted)":sc(b.stage);
    const pct=state.stages.length?Math.max(0,Math.round(((b.stage+1)/state.stages.length)*100)):0;
    const div=document.createElement("div");
    div.className="bundleCard";
    div.onclick=()=>{ _scanHit=b; _confirmStg=null; navigateTo("ctrl_scan"); setTimeout(()=>{ const inp=document.getElementById("scanInput"); if(inp)inp.value=b.barcode; renderScanResult(); },50); };
    div.innerHTML=`
      <div class="bundleIcon" style="background:${color}20;font-size:22px">📦</div>
      <div class="bundleInfo">
        <div class="row" style="flex-wrap:wrap;gap:5px">
          <span class="bundleName">${b.subject}</span>
          ${b.grade?`<span style="font-size:11px;color:var(--muted)">— ${b.grade}</span>`:""}
          <span class="tag" style="background:var(--blueBg);color:var(--blue)">${b.count} ورقة</span>
        </div>
        <p class="bundleMeta">${b.barcode}</p>
        <div class="bundleProgress">
          <div class="progressBar"><div class="progressFill" style="width:${pct}%;background:${color}"></div></div>
          <span style="font-size:10px;color:var(--muted)">${Math.max(0,b.stage+1)}/${state.stages.length}</span>
        </div>
      </div>
      <span class="bundleStageBadge" style="background:${color}20;color:${color};border-color:${color}50">${stageName}</span>`;
    container.appendChild(div);
  });
}

let _selTeachers=[], _selType="correction", _selBundle="";

function renderNotifSend(el) {
  const ntHTML=NOTIFY_TYPES.map(t=>`
    <button class="ntypeBtn${_selType===t.key?" active":""}" onclick="selNType('${t.key}')"
      style="${_selType===t.key?`border-color:${t.color};background:${t.color}15;color:${t.color};font-weight:800`:""}">
      ${t.icon} ${t.label}
    </button>`).join("");

  const teachersHTML=state.teachers.map(t=>`
    <button class="teacherRow${_selTeachers.includes(t.id)?" selected":""}" onclick="toggleTeacher('${t.id}')">
      <div class="teacherAvatar" style="background:${_selTeachers.includes(t.id)?"var(--navy)":"var(--border)"}">${_selTeachers.includes(t.id)?"✓":t.name.charAt(0)}</div>
      <div style="flex:1;text-align:right">
        <span style="font-weight:${_selTeachers.includes(t.id)?800:400};color:${_selTeachers.includes(t.id)?"var(--navy)":"var(--mid)"};font-size:13px">${t.name}</span>
        <span style="font-size:11px;color:var(--muted);margin-right:6px">${t.subject}</span>
      </div>
      <span class="tag" style="background:var(--purBg);color:var(--purple)">${TEACHER_ROLE_LABEL[t.role]||t.role}</span>
      <span style="font-size:11px;color:var(--wa);font-family:monospace;direction:ltr">${t.phone}</span>
    </button>`).join("") || `<p class="empty">لا يوجد معلمون — أضفهم من الإعدادات</p>`;

  el.innerHTML=`
  <div class="card">
    <p class="cardTitle">📲 إرسال تنبيه واتساب للمعلمين</p>
    <label class="lbl">نوع التنبيه</label>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${ntHTML}</div>
    <label class="lbl">المعلمون المستهدفون (اختر واحداً أو أكثر)</label>
    <div id="teacherList" style="margin-bottom:14px">${teachersHTML}</div>
    <label class="lbl">ربط بمظروف (اختياري)</label>
    <select class="inp" id="notif_bundle" style="margin-bottom:14px" onchange="_selBundle=this.value">
      <option value="">-- بدون ربط --</option>
      ${state.bundles.map(b=>`<option value="${b.id}"${_selBundle===b.id?" selected":""}>${b.barcode} — ${b.subject}${b.grade?" "+b.grade:""}</option>`).join("")}
    </select>
    <label class="lbl">نص الرسالة *</label>
    <textarea class="inp" id="notif_msg" rows="3" placeholder="اكتب نص التنبيه هنا...">${""}</textarea>
    <!-- Preview -->
    <div id="notifPreview" style="margin-top:12px"></div>
    <div class="row" style="margin-top:14px;flex-wrap:wrap;gap:8px">
      <button class="btn btn-wa" style="flex:1" onclick="sendNotif()">📲 إرسال عبر واتساب</button>
      <button class="btn" style="flex:1;background:var(--mid)" onclick="clearNotif()">مسح الحقول</button>
    </div>
    <!-- Admin direct WA -->
    <hr class="divider"/>
    <p style="font-size:12px;font-weight:700;color:var(--mid);margin-bottom:8px">📱 رقم واتساب المدير (للمراسلة المباشرة)</p>
    <div class="row">
      <span style="font-size:13px;font-family:monospace;color:var(--navy);direction:ltr;flex:1">${state.adminPhone}</span>
      <a href="${waLink(state.adminPhone,"مرحباً، رسالة من نظام تتبع المظاريف")}" target="_blank" class="btn btn-wa btn-sm">📲 واتساب المدير</a>
    </div>
  </div>`;
  document.getElementById("notif_msg").addEventListener("input",updatePreview);
  updatePreview();
}

function selNType(key) {
  _selType=key;
  renderNotifSend(document.getElementById("pageContent"));
}
function toggleTeacher(id) {
  _selTeachers = _selTeachers.includes(id) ? _selTeachers.filter(x=>x!==id) : [..._selTeachers,id];
  const el=document.getElementById("pageContent");
  renderNotifSend(el);
  // restore message
}
function clearNotif() {
  _selTeachers=[]; _selType="correction"; _selBundle="";
  renderNotifSend(document.getElementById("pageContent"));
}

function updatePreview() {
  const msgEl=document.getElementById("notif_msg");
  const prevEl=document.getElementById("notifPreview");
  if(!msgEl||!prevEl)return;
  const msg=msgEl.value.trim();
  if(!msg||_selTeachers.length===0){ prevEl.innerHTML=""; return; }
  const nt=NOTIFY_TYPES.find(t=>t.key===_selType);
  const names=_selTeachers.map(id=>state.teachers.find(t=>t.id===id)?.name||"").filter(Boolean).join("، ");
  prevEl.innerHTML=`
  <div style="background:var(--bg);border-radius:10px;padding:12px 14px;border:1px solid var(--border)">
    <p style="font-size:11px;font-weight:700;color:var(--mid);margin-bottom:6px">معاينة الرسالة</p>
    <div style="background:var(--white);border-radius:8px;padding:12px 14px;border:1px solid ${nt?.color||"var(--border)"}40">
      <p style="font-weight:800;color:${nt?.color};font-size:13px;margin-bottom:4px">${nt?.icon} ${nt?.label}</p>
      <p style="font-size:13px;color:var(--text);margin-bottom:4px">${msg}</p>
      <p style="font-size:11px;color:var(--muted)">إلى: ${names}</p>
    </div>
  </div>`;
}

function sendNotif() {
  if(_selTeachers.length===0){ toast("اختر معلماً على الأقل","err"); return; }
  const msg=document.getElementById("notif_msg")?.value.trim();
  if(!msg){ toast("أدخل نص الرسالة","err"); return; }
  const nt=NOTIFY_TYPES.find(t=>t.key===_selType);
  const bundle=state.bundles.find(b=>b.id===_selBundle)||null;
  const teachers=_selTeachers.map(id=>state.teachers.find(t=>t.id===id)).filter(Boolean);

  // Full WA message
  const fullMsg=`*${nt?.icon} ${nt?.label}*\n${state.schoolName}\n\n${msg}${bundle?`\n\nالمظروف: ${bundle.barcode} — ${bundle.subject}`:""}\n\n— ${currentUser.name}`;

  // Save to log
  // notifLog saved after push
  state.notifLog.unshift({
    id:uid(), ts:nowISO(), type:_selType,
    typeLabel:nt?.label, typeColor:nt?.color, typeIcon:nt?.icon,
    teachers, message:msg, bundle, sentBy:currentUser.name, waMsg:fullMsg,
  });
  saveState();
  toast(`📲 جاهز للإرسال لـ ${teachers.length} معلم عبر واتساب`,"wa");

  // Open WA for first teacher, rest open in tabs
  teachers.forEach((t,i)=>{
    const link=waLink(t.phone, fullMsg);
    if(i===0) window.open(link,"_blank");
    else setTimeout(()=>window.open(link,"_blank"), i*600);
  });
  _selTeachers=[]; _selBundle="";
  setTimeout(()=>renderNotifSend(document.getElementById("pageContent")),300);
}

function generatePDF(subjectFilter) {
  const bundles = subjectFilter==="ALL" ? state.bundles : state.bundles.filter(b=>b.subject===subjectFilter);
  if(bundles.length===0){toast("لا توجد بيانات","err");return;}
  const title = subjectFilter==="ALL" ? "تقرير شامل — جميع المواد" : `تقرير مادة ${subjectFilter}`;
  const printDate = new Date().toLocaleDateString("ar-SA",{dateStyle:"full"});

  // Summary counts per stage
  const stageSummary = state.stages.map((s,i)=>{
    const cnt=bundles.filter(b=>b.stage===i).length;
    return cnt>0?`<tr><td style="padding:6px 10px">${i+1}. ${s}</td><td style="padding:6px 10px;text-align:center;font-weight:700">${cnt}</td></tr>`:"";
  }).join("");

  // Detailed rows
  const detailRows = bundles.map((b,i)=>{
    const corrT=state.teachers.find(t=>t.id===b.corrector);
    const revT=state.teachers.find(t=>t.id===b.reviewer);
    const audT=state.teachers.find(t=>t.id===b.auditor);
    const stageName=b.stage<0?"جديد":state.stages[b.stage]||"—";
    const lastLog=b.log[b.log.length-1];
    const pct=state.stages.length?Math.max(0,Math.round(((b.stage+1)/state.stages.length)*100)):0;
    // mini progress bar (text-based)
    const bar="█".repeat(Math.round(pct/10))+"░".repeat(10-Math.round(pct/10));
    return `<tr style="border-bottom:1px solid #e5e7eb;background:${i%2===0?"#fff":"#f9fafb"}">
      <td style="padding:8px 10px;font-family:monospace;font-size:11px">${b.barcode}</td>
      <td style="padding:8px 10px;font-weight:700">${b.subject}</td>
      <td style="padding:8px 10px">${b.grade||"—"}</td>
      <td style="padding:8px 10px;text-align:center">${b.count}</td>
      <td style="padding:8px 10px">${b.examDay||""}${b.examDate?" "+b.examDate:""}</td>
      <td style="padding:8px 10px">${b.examHall||"—"}</td>
      <td style="padding:8px 10px">${corrT?corrT.name:"—"}</td>
      <td style="padding:8px 10px">${revT?revT.name:"—"}</td>
      <td style="padding:8px 10px">${audT?audT.name:"—"}</td>
      <td style="padding:8px 10px;font-size:11px;font-weight:700;color:${b.stage<0?"#64748b":"#0D1F3C"}">${stageName}</td>
      <td style="padding:8px 10px;font-size:10px;font-family:monospace;direction:ltr;color:#64748b">${bar} ${pct}%</td>
      <td style="padding:8px 10px;font-size:10px;color:#64748b">${lastLog?new Date(lastLog.ts).toLocaleDateString("ar-SA"):"—"}</td>
    </tr>`;
  }).join("");

  // Log rows for each bundle
  const logSection = bundles.filter(b=>b.log.length>0).map(b=>`
    <div style="margin-bottom:20px;page-break-inside:avoid">
      <h4 style="font-size:13px;color:#0D1F3C;margin-bottom:6px;border-right:3px solid #C8911F;padding-right:8px">
        ${b.barcode} — ${b.subject}${b.grade?" ("+b.grade+")":""} · ${b.count} ورقة
        ${b.examDate?` · 📅 ${b.examDay||""} ${b.examDate}`:""}
      </h4>
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <thead><tr style="background:#f1f5f9">
          <th style="padding:5px 8px;text-align:right">#</th>
          <th style="padding:5px 8px;text-align:right">المرحلة</th>
          <th style="padding:5px 8px;text-align:right">التاريخ والوقت</th>
          <th style="padding:5px 8px;text-align:right">المستخدم</th>
          <th style="padding:5px 8px;text-align:right">ملاحظة</th>
        </tr></thead>
        <tbody>
          ${b.log.map((e,i)=>`<tr style="border-bottom:1px solid #e5e7eb">
            <td style="padding:5px 8px;color:#64748b">${i+1}</td>
            <td style="padding:5px 8px;font-weight:700">${e.stageLabel}</td>
            <td style="padding:5px 8px;direction:ltr;text-align:right;color:#64748b">${new Date(e.ts).toLocaleString("ar-SA",{dateStyle:"short",timeStyle:"short"})}</td>
            <td style="padding:5px 8px">${e.user}</td>
            <td style="padding:5px 8px;color:#64748b;font-style:italic">${e.note||"—"}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>`).join("");

  const win=window.open("","_blank","width=1050,height=800");
  win.document.write(`<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<title>${title}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap');

  body{font-family:'Tajawal',Arial,sans-serif;direction:rtl;color:#0D1F3C;font-size:13px;line-height:1.5}
  .page{padding:28px 32px}
  .header{border-bottom:3px solid #0D1F3C;padding-bottom:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start}
  .header h1{font-size:22px;font-weight:900;color:#0D1F3C}
  .header .sub{font-size:13px;color:#64748b;margin-top:4px}
  .header .badge{background:#0D1F3C;color:#fff;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700}
  .section-title{font-size:15px;font-weight:800;color:#0D1F3C;margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:8px}
  .kpi-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .kpi{flex:1;min-width:100px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;text-align:center}
  .kpi .val{font-size:28px;font-weight:900;color:#0D1F3C}
  .kpi .lbl{font-size:11px;color:#64748b;margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:#0D1F3C;color:#fff;padding:9px 10px;text-align:right;font-weight:700}
  .footer{margin-top:28px;padding-top:14px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;font-size:11px;color:#94a3b8}
  .no-print{margin-top:20px;display:flex;gap:10px;justify-content:center}
  @media print{
    .no-print{display:none}
    body{font-size:11px}
    .page{padding:16px 20px}
    tr{page-break-inside:avoid}
  }
</style>
</head>
<body>
<div class="page">
  <!-- HEADER -->
  <div class="header">
    <div>
      <h1>${state.schoolName}</h1>
      <p class="sub">${title}</p>
      <p class="sub">تاريخ التقرير: ${printDate}</p>
    </div>
    <div class="badge">${bundles.length} مظروف</div>
  </div>

  <!-- KPIs -->
  <div class="kpi-row">
    <div class="kpi"><div class="val">${bundles.length}</div><div class="lbl">إجمالي المظاريف</div></div>
    <div class="kpi"><div class="val">${bundles.reduce((a,b)=>a+b.count,0)}</div><div class="lbl">إجمالي الأوراق</div></div>
    <div class="kpi"><div class="val">${bundles.filter(b=>b.stage===state.stages.length-1).length}</div><div class="lbl">مكتملة</div></div>
    <div class="kpi"><div class="val">${bundles.filter(b=>b.stage<0).length}</div><div class="lbl">جديدة</div></div>
    <div class="kpi"><div class="val">${bundles.filter(b=>b.stage>=0&&b.stage<state.stages.length-1).length}</div><div class="lbl">قيد التنفيذ</div></div>
  </div>

  <!-- STAGE SUMMARY -->
  <p class="section-title">📊 ملخص المراحل</p>
  <table style="margin-bottom:20px">
    <thead><tr><th>المرحلة</th><th style="text-align:center">عدد المظاريف</th></tr></thead>
    <tbody>
      <tr style="border-bottom:1px solid #e5e7eb">
        <td style="padding:6px 10px">جديد (لم تبدأ)</td>
        <td style="padding:6px 10px;text-align:center;font-weight:700">${bundles.filter(b=>b.stage<0).length}</td>
      </tr>
      ${stageSummary}
    </tbody>
  </table>

  <!-- DETAIL TABLE -->
  <p class="section-title">📦 تفاصيل المظاريف</p>
  <div style="overflow-x:auto;margin-bottom:24px">
  <table>
    <thead>
      <tr>
        <th>الباركود</th><th>المادة</th><th>الصف</th><th style="text-align:center">الأوراق</th>
        <th>تاريخ الاختبار</th><th>القاعة</th><th>المصحح</th><th>المراجع</th><th>المدقق</th>
        <th>المرحلة الحالية</th><th>التقدم</th><th>آخر تحديث</th>
      </tr>
    </thead>
    <tbody>${detailRows}</tbody>
  </table>
  </div>

  <!-- MOVEMENT LOG -->
  ${bundles.some(b=>b.log.length>0)?`
  <p class="section-title">📜 سجل حركة المظاريف</p>
  <div>${logSection}</div>`:""}

  <!-- FOOTER -->
  <div class="footer">
    <span>${state.schoolName} — نظام تتبع مظاريف الاختبارات</span>
    <span>طُبع بواسطة: ${currentUser.name} — ${printDate}</span>
  </div>

  <!-- PRINT BUTTON -->
  <div class="no-print">
    <button onclick="window.print()" style="padding:10px 28px;background:#0D1F3C;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit;font-weight:700">🖨️ طباعة / حفظ PDF</button>
    <button onclick="window.close()" style="padding:10px 20px;background:#64748b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit">إغلاق</button>
  </div>
</div>
</body></html>`);
  win.document.close();
  toast("تم فتح نافذة التقرير — اختر طباعة أو حفظ PDF ✅");
}

function pdfSchedule() {
  printSchedule();
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
loadState();          // ← restore from localStorage on page load
renderLoginDemos();
</script>
</body>
</html>

            <canvas id="apprSigCanvas" width="280" height="80" style="border:1.5px solid var(--border);border-radius:9px;background:#fff;display:block;width:100%;max-width:320px;touch-action:none"></canvas>

            </div>
          </div>`:""}
        </div>`).join("")}
      </div>`}
  </div>

  ${decided.length>0?`

function viewApprovalDoc(docType, docId) {
  if(!_approvalDocExists(docType, docId)) { toast("هذا المستند غير موجود — يبدو أنه تم حذفه","err"); return; }
  if(docType==="minutes") printArchivedMinutesById(docId);
  else if(docType==="pledge") printMonitorReport(docId);
  else if(docType==="daily") printDailyReport(docId);
}

function approveDocument(approvalId) {
  const a = (state.approvals||[]).find(x=>x.id===approvalId);
  if(!a) return;
  if(!_approvalDocExists(a.docType, a.docId)) { toast("لا يمكن الاعتماد — المستند المرتبط بهذا الطلب تم حذفه","err"); _approvingId=null; renderPrincipalApprovals(document.getElementById("pageContent")); return; }
  const canvas = document.getElementById("apprSigCanvas");
  const sig = canvas ? canvas.toDataURL() : "";
  a.status="approved"; a.principalName=currentUser.name; a.principalSig=sig; a.decidedAt=nowISO();
  // إشعار صاحب المستند
  if(!state.inbox) state.inbox=[];
  state.inbox.push({ id:uid(), to: a.docType==="minutes"?"controller":"monitor", from:"مدير المدرسة", type:"info",
    title:"تم اعتماد مستندك", body:a.title, ts:nowISO(), read:false });
  _approvingId=null;
  saveState(); saveToCloud();
  toast("✅ تم اعتماد المستند وأُرسل إشعار");
  renderPrincipalApprovals(document.getElementById("pageContent"));
}

function rejectDocument(approvalId) {
  const reason = prompt("سبب الرفض (اختياري):","");
  if(reason===null) return;
  const a = (state.approvals||[]).find(x=>x.id===approvalId);
  if(!a) return;
  // الرفض مسموح حتى لو حُذف المستند، فهو لا يفترض وجوده مثل الاعتماد
  a.status="rejected"; a.principalName=currentUser.name; a.decidedAt=nowISO(); a.rejectReason=reason||"";
  if(!state.inbox) state.inbox=[];
  state.inbox.push({ id:uid(), to: a.docType==="minutes"?"controller":"monitor", from:"مدير المدرسة", type:"urgent",
    title:"تم رفض مستندك", body:a.title+(reason?" — "+reason:""), ts:nowISO(), read:false });
  saveState(); saveToCloud();
  toast("تم رفض المستند");
  renderPrincipalApprovals(document.getElementById("pageContent"));
}

    .footer{margin-top:20px;padding-top:12px;border-top:1px solid #e5e7eb;display:flex;justify-content:space-between;font-size:10px;color:#94a3b8}
    .no-print{margin-top:16px;display:flex;gap:8px}
    @media print{.no-print{display:none}body{font-size:11px}.page{padding:16px 20px}}
  </style></head><body>
  <div class="page">
    <div class="header">
      <img src="${LOGO_SRC}" alt="شعار" style="width:110px;height:110px;object-fit:contain;flex-shrink:0"/>
      <div style="flex:1"><h1>${state.schoolName}</h1><p class="sub">تقرير مدير المدرسة — ${printDate}</p></div>
      <div style="background:#0D1F3C;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700">${total} مظروف</div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="val">${total}</div><div class="lbl">إجمالي المظاريف</div></div>
      <div class="kpi"><div class="val">${totalPapers}</div><div class="lbl">إجمالي الأوراق</div></div>
      <div class="kpi"><div class="val" style="color:#059669">${done}</div><div class="lbl">مكتملة</div></div>
      <div class="kpi"><div class="val" style="color:#D97706">${inProg}</div><div class="lbl">جارية</div></div>
      <div class="kpi"><div class="val" style="color:#64748b">${newB}</div><div class="lbl">جديدة</div></div>
      <div class="kpi"><div class="val" style="color:${pct>=80?"#059669":pct>=50?"#D97706":"#2563EB"}">${pct}%</div><div class="lbl">نسبة الإنجاز</div></div>
    </div>
    <h3>📚 ملخص المواد</h3>
    <table>
      <thead><tr><th>المادة</th><th>المظاريف</th><th>الأوراق</th><th>مكتمل</th><th>جارٍ</th><th>نسبة الإنجاز</th></tr></thead>
      <tbody>
      ${Object.entries(subjectRows).map(([s,d])=>{
        const p=d.total>0?Math.round((d.done/d.total)*100):0;
        return `<tr><td style="font-weight:700">${s}</td><td>${d.total}</td><td>${d.papers}</td>
        <td style="color:#059669;font-weight:700">${d.done}</td><td style="color:#D97706">${d.inProg}</td>
        <td><div class="prog"><div class="prog-fill" style="width:${p}%;background:${p>=80?"#059669":p>=50?"#F59E0B":"#3B82F6"}"></div></div>${p}%</td></tr>`;

    </table>
    <h3>📦 تفاصيل جميع المظاريف</h3>
    <table>
      <thead><tr><th>الباركود</th><th>المادة</th><th>الصف</th><th>الأوراق</th><th>المصحح</th><th>المرحلة الحالية</th><th>آخر تحديث</th></tr></thead>

    </div>
  </div>

function saveMonitorNote() {
  const subj = document.getElementById("mnSubj").value.trim();
  const grade = document.getElementById("mnGrade").value.trim();
  const hall = document.getElementById("mnHall").value.trim();
  const date = hijriVal("mnDate");
  const note = document.getElementById("mnNote").value.trim();
  if (!note) { toast("اكتب الملاحظة أولاً","err"); return; }
  if (!state.monitorNotes) state.monitorNotes = [];
  state.monitorNotes.push({ id:uid(), subject:subj, grade:grade, hall:hall, date:date, note:note, savedAt:nowISO(), user:currentUser.name });
  // إرسال إشعار للكنترول
  if (!state.inbox) state.inbox = [];
  const inboxSuffix = subj ? " ["+subj+(grade?" — "+grade:"")+"]" : "";
  state.inbox.push({ id:uid(), to:"controller", from:"مراقب اللجان", type:"info", title:"ملاحظة من مراقب اللجان"+inboxSuffix, body:note, ts:nowISO(), read:false });
  saveState(); saveToCloud();
  toast("✅ تم حفظ الملاحظة وإبلاغ الكنترول");
  renderMonitorCommittees(document.getElementById("pageContent"));
}

function deleteMonitorNote(id) {
  var rec = (state.monitorNotes||[]).find(n=>n.id===id);
  if(rec && !_monitorVisible(rec)) { toast("لا تملك صلاحية حذف هذا السجل","err"); return; }
  state.monitorNotes = (state.monitorNotes||[]).filter(n=>n.id!==id);
  _markDeleted(id);
  saveState(); saveToCloud();
  toast("تم الحذف");
  renderMonitorCommittees(document.getElementById("pageContent"));
}

function ppAutoFillStudents() {
  const hall = document.getElementById("ppHall").value;
  const grade = document.getElementById("ppGrade").value;
  if(!hall) return;
  const count = (state.studentsDB||[]).filter(s=>s.committee===hall && (!grade || s.grade===grade)).length;
  document.getElementById("ppStudents").value = count;
}

function saveMonitorPapers() {
  const subj = document.getElementById("ppSubj").value.trim();
  const grade = document.getElementById("ppGrade").value.trim();
  const hall = document.getElementById("ppHall").value.trim();
  const date = hijriVal("ppDate");
  const observer = document.getElementById("ppObserver").value.trim();
  const students = document.getElementById("ppStudents").value.trim();
  const qCount = document.getElementById("ppQCount").value.trim();
  const aCount = document.getElementById("ppACount").value.trim();
  const status = document.getElementById("ppStatus").value;
  const notes = document.getElementById("ppNotes").value.trim();
  if (!subj) { toast("اختر المادة أولاً","err"); return; }
  if (!hall) { toast("أدخل رقم القاعة","err"); return; }
  const canvas = document.getElementById("sigCanvasPapers");
  const sig = canvas ? canvas.toDataURL() : "";
  if (!state.monitorReports) state.monitorReports = [];
  state.monitorReports.push({
    id:uid(), type:"papers", subject:subj, grade:grade, hall:hall, date:date,
    observer:observer, students:students, qCount:parseInt(qCount)||0, aCount:parseInt(aCount)||0,
    status:status, notes:notes, sig:sig, monitorName:currentUser.name, savedAt:nowISO()
  });
  saveState(); saveToCloud();
  toast("✅ تم حفظ محضر الاستلام");
  renderMonitorPapers(document.getElementById("pageContent"));
}

function teacherOptions(addEmpty=true) {
  const sorted = [...(state.teachers||[])].sort((a,b)=>a.name.localeCompare(b.name,"ar"));
  return (addEmpty?`<option value="">-- اختر الملاحظ --</option>`:"")+sorted.map(t=>`<option value="${t.name}">${t.name}</option>`).join("");
}

function _calcAbsent(idx) {
  const t=parseInt((document.getElementById("dr_total_"+idx)||{}).value||0);
  const p=parseInt((document.getElementById("dr_pres_"+idx)||{}).value||0);
  const absEl=document.getElementById("dr_abs_"+idx);
  if(absEl) absEl.value=Math.max(0,t-p);
}

function _addDailyRow() {
  const gradeOptions = (state.grades||[]).map(g=>`<option value="${g}">${g}</option>`).join("");

  const tr = document.createElement("tr");
  tr.id = "dr_row_"+_dailyRowCount;
  tr.style.borderBottom="1px solid var(--border)";
  tr.innerHTML = _buildDailyRow(_dailyRowCount, gradeOptions, subjectOptions).replace(/<tr[^>]*>/,"").replace("</tr>","");
  tbody.appendChild(tr);
  _dailyRowCount++;
}

function _removeDailyRow(idx) {
  const row = document.getElementById("dr_row_"+idx);

function saveMonitorDailyReport() {
  const day = (document.getElementById("dr_day")||{}).value||"";
  const date = hijriVal("dr_date");
  const monitorName = (document.getElementById("dr_monitor_name")||{}).value?.trim()||currentUser.name;

  // collect attendance rows
  const rows = [];
  for(let i=0;i<_dailyRowCount+10;i++){
    const grEl=document.getElementById("dr_grade_"+i);
    const subEl=document.getElementById("dr_subj_"+i);
    if(!grEl&&!subEl) continue;
    const grade=grEl?.value||""; const subject=subEl?.value||"";
    if(!grade&&!subject) continue;
    const total=parseInt((document.getElementById("dr_total_"+i)||{}).value||0);
    const present=parseInt((document.getElementById("dr_pres_"+i)||{}).value||0);
    const absent=Math.max(0,total-present);
    rows.push({grade,subject,total,present,absent});
  }

  // collect observations
  const observations = DAILY_OBS_ITEMS.map(item=>{
    const yesEl=document.getElementById("obs_"+item.id+"_yes");
    const value=yesEl&&yesEl.checked?"yes":"no";
    const note=(document.getElementById("obs_note_"+item.id)||{}).value?.trim()||"";
    return {id:item.id, label:item.label, value, note};
  });

  // signature
  const canvas=document.getElementById("dr_sig_canvas");
  const sig=canvas?canvas.toDataURL():"";

  if(!state.monitorDailyReports) state.monitorDailyReports=[];
  state.monitorDailyReports.push({
    id:uid(), day, date, monitorName, rows, observations, sig,
    savedAt:nowISO()
  });
  saveState(); saveToCloud();
  toast("✅ تم حفظ التقرير اليومي");
  _dailyRowCount=3;
  renderMonitorDaily(document.getElementById("pageContent"));
}

  state.monitorDailyReports=(state.monitorDailyReports||[]).filter(r=>r.id!==id);

let _sdbQ = "", _sdbCommittee = "", _sdbGrade = "";
function _sdbCommittees() {
  const set = new Set((state.studentsDB||[]).map(s=>s.committee).filter(Boolean));
  let list = Array.from(set).sort(_sdbCommitteeCompare);
  if(currentUser && currentUser.role==="monitor" && currentUser.assignedCommittees && currentUser.assignedCommittees.length){
    list = list.filter(c=>currentUser.assignedCommittees.includes(c));
  }
  return list;
}
function _sdbGrades() {
  const set = new Set((state.studentsDB||[]).map(s=>s.grade).filter(Boolean));
  return Array.from(set);
}
function _sdbCommitteeCompare(a, b) {
  const an=parseInt(a), bn=parseInt(b);
  if(!isNaN(an)&&!isNaN(bn)) return an-bn;
  if(!isNaN(an)) return -1;
  if(!isNaN(bn)) return 1;
  return String(a||"").localeCompare(String(b||""));
}
function _sdbFiltered() {
  const q = _sdbQ.trim();
  const visible = (currentUser && currentUser.role==="monitor" && currentUser.assignedCommittees && currentUser.assignedCommittees.length) ? currentUser.assignedCommittees : null;
  const gradeOrder = state.grades||[];
  return (state.studentsDB||[]).filter(s=>{
    if(visible && !visible.includes(s.committee)) return false;
    if(_sdbCommittee && s.committee!==_sdbCommittee) return false;
    if(_sdbGrade && s.grade!==_sdbGrade) return false;
    if(q && !(s.name.includes(q) || (s.sid||"").includes(q) || (s.phone||"").includes(q))) return false;
    return true;
  }).sort((a,b)=>{
    const cc = _sdbCommitteeCompare(a.committee, b.committee);
    if(cc!==0) return cc;
    const ag=gradeOrder.indexOf(a.grade), bg=gradeOrder.indexOf(b.grade);
    const gc = (ag===-1&&bg===-1) ? String(a.grade||"").localeCompare(String(b.grade||"")) : (ag===-1?1 : bg===-1?-1 : ag-bg);
    if(gc!==0) return gc;
    return String(a.name||"").localeCompare(String(b.name||""));
  });
}
function sdbUpdate(field, val) {
  if(field==="q") _sdbQ=val;
  if(field==="committee") _sdbCommittee=val;
  if(field==="grade") _sdbGrade=val;
  _sdbRenderResults();
}

      <button class="btn btn-green btn-full" style="margin-top:8px" onclick="sdbBulkImport()">📥 استيراد</button>
    </div>`:""}

  </div>`;

function isSpecialStudent(s) { return !!(s && (s.committee==="خاصة" || s.specialNeeds)); }
function _sdbRenderResults() {
  const box = document.getElementById("sdb_resultsBox");
  if(!box) return;
  const list = _sdbFiltered();
  const isAdmin = currentUser && currentUser.role==="admin";
  box.innerHTML = `
    <p style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">نتائج البحث: ${list.length}</p>

      : `<div style="display:flex;flex-direction:column;gap:8px">
        ${list.slice(0,200).map(s=>`
        <div style="display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:10px;padding:10px 12px;border:1px solid var(--border)">

function downloadStudentTemplate() {
  if(typeof XLSX === "undefined") { toast("مكتبة Excel غير محملة، تحقق من الاتصال بالإنترنت","err"); return; }
  const wb = XLSX.utils.book_new();
  const headers = ["اسم الطالب *","رقم الطالب","رقم الجوال *","اللجنة *","المرحلة"];
  const samples = [
    ["أحمد بن سعد العتيبي", "1152183305", "966505953101", "3", "أول ثانوي"],
    ["", "", "", "", ""],
    ["", "", "", "", ""],
    ["", "", "", "", ""],
  ];
  const ws = XLSX.utils.aoa_to_sheet([headers, ...samples]);
  ws["!cols"] = [{wch:30},{wch:16},{wch:18},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws, "بيانات الطلاب");
  XLSX.writeFile(wb, "نموذج_بيانات_الطلاب.xlsx");
  toast("تم تنزيل ملف النموذج ✅");
}
function handleStudentXlsxFile(input) {
  const file = input.files[0];
  if(file) processStudentXlsxFile(file);
  input.value = "";
}
function processStudentXlsxFile(file) {
  if(typeof XLSX === "undefined") { toast("مكتبة Excel غير محملة","err"); return; }
  const replace = document.getElementById("sdb_file_replace").checked;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, {type:"array"});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});

      let headerRow = -1;
      for(let i=0;i<Math.min(rows.length,8);i++){
        const r = rows[i].join("");
        if(r.includes("اسم") || r.includes("Name") || r.includes("name")) { headerRow=i; break; }
      }
      if(headerRow < 0) { toast("لم يتم العثور على رأس الجدول — تأكد من استخدام النموذج الصحيح","err"); return; }

      const hRow   = rows[headerRow].map(h=>String(h).trim());
      const colMap = {};
      hRow.forEach((h,i)=>{
        if(h.includes("اسم")||h.includes("Name")||h.includes("name"))         colMap.name=i;
        if(h.includes("الطالب")&&h.includes("رقم"))                          colMap.sid=i;
        if(h.includes("الجوال")||h.includes("Phone")||h.includes("phone"))    colMap.phone=i;
        if(h.includes("اللجنة")||h.includes("Committee")||h.includes("committee")) colMap.committee=i;
        if(h.includes("المرحلة")||h.includes("Grade")||h.includes("grade"))   colMap.grade=i;
      });
      if(colMap.name===undefined) { toast("لم يتم العثور على عمود اسم الطالب","err"); return; }

      const newRows=[];
      for(let i=headerRow+1;i<rows.length;i++){
        const row = rows[i];
        const name = String(row[colMap.name]||"").trim();
        if(!name) continue;
        newRows.push({
          id:uid(), name,
          sid: colMap.sid!==undefined ? String(row[colMap.sid]||"").trim() : "",
          phone: colMap.phone!==undefined ? String(row[colMap.phone]||"").trim() : "",
          committee: colMap.committee!==undefined ? String(row[colMap.committee]||"").trim() : "",
          grade: colMap.grade!==undefined ? String(row[colMap.grade]||"").trim() : "",
        });
      }
      if(newRows.length===0) { toast("لم يتم العثور على بيانات طلاب في الملف","err"); return; }
      let skipped = 0;
      if(replace) {
        // عند "استبدال الكل" نُسجِّل المعرفات القديمة كمحذوفة، وإلا فإن دمج البيانات
        // مع النسخة السحابية عند الحفظ سيُعيد إحياء السجلات المستبدلة
        (state.studentsDB||[]).forEach(s=>{ if(s.id) _markDeleted(s.id); });
        state.studentsDB = newRows;
      } else {
        // تفادي تكرار الطالب نفسه عند استيراد نفس الملف مرتين بالخطأ — المطابقة
        // برقم الهوية إن وُجد، وإلا بالاسم
        const existing = state.studentsDB||[];
        const existingSids = new Set(existing.filter(s=>s.sid).map(s=>s.sid));
        const existingNames = new Set(existing.filter(s=>!s.sid).map(s=>s.name));
        const toAdd = [];
        newRows.forEach(r=>{
          const isDup = r.sid ? existingSids.has(r.sid) : existingNames.has(r.name);
          if(isDup) { skipped++; return; }
          if(r.sid) existingSids.add(r.sid); else existingNames.add(r.name);
          toAdd.push(r);
        });
        state.studentsDB = existing.concat(toAdd);
      }
      saveState(); saveToCloud();
      toast(`تم استيراد ${replace?newRows.length:newRows.length-skipped} طالب من الملف${skipped?` (تم تجاهل ${skipped} مكرر)`:""} ✅`);
      renderStudentsDB(document.getElementById("pageContent"));
    } catch(err) {
      console.error(err);
      toast("تعذّر قراءة الملف — تأكد من أنه بصيغة Excel صحيحة","err");
    }
  };
  reader.readAsArrayBuffer(file);
}

function _sdbParseLines(raw) {
  const lines = raw.split("\n").map(l=>l.trim()).filter(Boolean);
  const rows=[];
  lines.forEach(line=>{
    const parts = line.split(/[,\t]/).map(p=>p.trim());
    if(parts.length<1 || !parts[0]) return;
    if(/^(الاسم|name)$/i.test(parts[0])) return; // skip header row
    rows.push({id:uid(), name:parts[0]||"", sid:parts[1]||"", phone:parts[2]||"", committee:parts[3]||"", grade:parts[4]||""});
  });
  return rows;
}
function sdbBulkImport() {
  const raw = document.getElementById("sdb_bulk").value;
  const rows = _sdbParseLines(raw);
  if(rows.length===0) { toast("لم يتم العثور على بيانات صحيحة","err"); return; }
  state.studentsDB = (state.studentsDB||[]).concat(rows);
  saveState(); saveToCloud();
  toast(`تم استيراد ${rows.length} طالب ✅`);
  renderStudentsDB(document.getElementById("pageContent"));
}

function showPledgeForm(pledgeType) {
  const f = PLEDGE_FORMS.find(x=>x.key===pledgeType);
  if(!f) return;

  // إبراز الزر المحدد
  PLEDGE_FORMS.forEach(x=>{
    const btn = document.getElementById("pledgeBtn_"+x.key);
    if(btn) { btn.style.background=x.key===pledgeType?x.color+"25":x.color+"08"; btn.style.borderColor=x.key===pledgeType?x.color:x.color+"30"; }
  });

  const today = new Date().toISOString().slice(0,10);
  const subjectOptions = state.subjects.map(s=>`<option>${s}</option>`).join("");
  const gradeOptions = state.grades.map(g=>`<option>${g}</option>`).join("");

  const buildField = field => {
    if(field.type==="teacher_select") return `<div><label class="lbl">${field.label}</label><select class="inp" id="${field.id}">${teacherOptions()}</select></div>`;
    if(field.type==="select") return `<div><label class="lbl">${field.label}</label><select class="inp" id="${field.id}"><option value="">-- اختر --</option>${(field.options||[]).map(o=>`<option>${o}</option>`).join("")}</select></div>`;
    if(field.type==="textarea") return `<div style="grid-column:1/-1"><label class="lbl">${field.label}</label><textarea class="inp" id="${field.id}" rows="2" placeholder="${field.placeholder||""}" style="resize:vertical"></textarea></div>`;
    if(field.type==="date") return `<div><label class="lbl">${field.label}</label>${hijriPicker(field.id)}</div>`;
    if(field.type==="time") return `<div><label class="lbl">${field.label}</label><input class="inp" id="${field.id}" type="time"/></div>`;
    if(field.type==="number") return `<div><label class="lbl">${field.label}</label><input class="inp" id="${field.id}" type="number" min="0" placeholder="${field.placeholder||"0"}"/></div>`;
    return `<div><label class="lbl">${field.label}</label><input class="inp" id="${field.id}" placeholder="${field.placeholder||""}"/></div>`;
  };

  document.getElementById("pledgeFormContainer").innerHTML = `
    <div style="background:${f.color}08;border:2px solid ${f.color}40;border-radius:14px;padding:18px;margin-top:8px">
      <p style="font-weight:900;color:${f.color};font-size:15px;margin-bottom:4px">${f.icon} ${f.title}</p>
      ${f.subTitle?`<p style="font-size:11px;color:var(--muted);margin-bottom:14px">${f.subTitle}</p>`:""}

      <!-- بيانات الطالب -->
      <p style="font-size:12px;font-weight:800;color:var(--navy);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">📌 بيانات الطالب</p>
      <div class="g2" style="margin-bottom:10px">
        <div><label class="lbl">اللجنة</label><select class="inp" id="st_committee" onchange="pledgeRefreshStudentOptions()"><option value="">-- اختر اللجنة --</option>${_sdbCommittees().map(c=>`<option value="${c}">لجنة ${c}</option>`).join("")}</select></div>
        <div><label class="lbl">اسم الطالب *</label><select class="inp" id="st_student_select" onchange="pledgeApplyStudentSelection()" disabled><option value="">-- اختر اللجنة أولاً --</option></select></div>
      </div>
      <div class="g2" style="margin-bottom:10px">
        <input type="hidden" id="st_name"/>
        <div><label class="lbl">السجل المدني</label><input class="inp" id="st_civil" placeholder="رقم السجل المدني" dir="ltr"/></div>
        <div><label class="lbl">رقم الجلوس</label><input class="inp" id="st_seat" placeholder="رقم الجلوس"/></div>
        <div><label class="lbl">الصف</label><select class="inp" id="st_grade"><option value="">-- اختر --</option>${gradeOptions}</select></div>
        ${f.hasMaterial||!f.extraFields.find(x=>x.id==="subject")?`<div><label class="lbl">المادة</label><select class="inp" id="subject"><option value="">-- اختر --</option>${subjectOptions}</select></div>`:""}
        <div><label class="lbl">التاريخ</label>${hijriPicker("st_date")}</div>
      </div>

      <!-- الحقول الإضافية -->
      ${f.extraFields && f.extraFields.length ? `
      <p style="font-size:12px;font-weight:800;color:var(--navy);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)">📋 تفاصيل النموذج</p>
      <div class="g2" style="margin-bottom:10px">${f.extraFields.map(buildField).join("")}</div>` : ""}

      <!-- نص التعهد -->
      ${f.textTemplate?`
      <div style="background:#fff;border-right:4px solid ${f.color};border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.9;color:var(--dark)">
        <p style="font-weight:700;color:${f.color};margin-bottom:6px">نص التعهد / الإقرار:</p>
        <p id="pledgeTextPreview">أتعهد أنا الطالب / ${f.title}</p>
      </div>`:""}

      <!-- توقيع الطالب -->
      ${f.hasStudentSig?`
      <p style="font-size:12px;font-weight:800;color:var(--navy);margin-bottom:8px">✍️ توقيع الطالب الإلكتروني *</p>
      <div style="border:2px dashed ${f.color};border-radius:10px;overflow:hidden;background:#fff;touch-action:none;margin-bottom:6px">
        <canvas id="sigStudent" width="600" height="110" style="width:100%;height:110px;cursor:crosshair;display:block"></canvas>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">
        <button class="btn btn-outline btn-sm" onclick="clearSigCanvas('sigStudent')">🗑️ مسح</button>
        <span style="font-size:11px;color:var(--muted)">توقيع الطالب بإصبعه أو الماوس</span>
      </div>`:""}

      <!-- توقيع المراقب -->
      ${f.hasMonitorSig?`
      <p style="font-size:12px;font-weight:800;color:var(--navy);margin-bottom:4px">👁 توقيع مراقب اللجنة</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div><label class="lbl">اسم مراقب اللجنة</label><input class="inp" id="monitor_name" value="${currentUser.name}" placeholder="اسم المراقب"/></div>
        <div><label class="lbl">&nbsp;</label>
          <div style="border:2px dashed #64748B;border-radius:8px;overflow:hidden;background:#fff;touch-action:none">
            <canvas id="sigMonitor" width="300" height="70" style="width:100%;height:70px;cursor:crosshair;display:block"></canvas>
          </div>
        </div>
      </div>
      <div style="margin-bottom:14px">
        <button class="btn btn-outline btn-sm" onclick="clearSigCanvas('sigMonitor')">🗑️ مسح توقيع المراقب</button>
      </div>`:""}

      <button class="btn btn-full" style="background:linear-gradient(135deg,${f.color},${f.color}bb);color:#fff;font-size:14px;font-weight:800;padding:13px"
        onclick="saveMonitorPledge('${pledgeType}')">
        💾 حفظ النموذج بالتوقيع الإلكتروني
      </button>
    </div>`;

  if(f.hasStudentSig) initSigCanvas("sigStudent");
  if(f.hasMonitorSig) initSigCanvas("sigMonitor");
  document.getElementById("pledgeFormContainer").scrollIntoView({behavior:"smooth",block:"start"});
}

function pledgeRefreshStudentOptions() {
  const committee = document.getElementById("st_committee").value;
  const sel = document.getElementById("st_student_select");
  if(!committee) {
    sel.innerHTML = `<option value="">-- اختر اللجنة أولاً --</option>`;
    sel.disabled = true;
    document.getElementById("st_name").value = "";
    return;
  }
  const students = (state.studentsDB||[]).filter(s=>s.committee===committee).sort((a,b)=>a.name.localeCompare(b.name));
  sel.innerHTML = `<option value="">-- اختر الطالب --</option>` + students.map(s=>`<option value="${esc(s.id)}">${isSpecialStudent(s)?"⚠ ":""}${esc(s.name)}</option>`).join("");
  sel.disabled = false;
}
function pledgeApplyStudentSelection() {
  const sid = document.getElementById("st_student_select").value;
  const student = (state.studentsDB||[]).find(s=>s.id===sid);
  document.getElementById("st_name").value = student ? student.name : "";
  if(student) {
    const civil = document.getElementById("st_civil"); if(civil) civil.value = student.sid||"";
    const grade = document.getElementById("st_grade"); if(grade && student.grade) grade.value = student.grade;
    if(isSpecialStudent(student)) toast("⚠ هذا الطالب لديه احتياج خاص: "+(student.specialNeeds||"يرجى مراعاة حالته"),"err");
  }
}
function saveMonitorPledge(pledgeType) {
  const f = PLEDGE_FORMS.find(x=>x.key===pledgeType);
  if(!f) return;
  const stName = (document.getElementById("st_name")||{}).value||"";
  if(!stName.trim()) { toast("أدخل اسم الطالب أولاً","err"); return; }

  if(f.hasStudentSig) {
    const sc = document.getElementById("sigStudent");
    if(sc){const ctx=sc.getContext("2d");if(!ctx.getImageData(0,0,sc.width,sc.height).data.some(x=>x!==0)){toast("الرجاء إضافة توقيع الطالب","err");return;}}
  }

  // جمع البيانات
  const allIds = ["st_name","st_civil","st_seat","st_grade","subject","st_text","st_violation","st_vtype","st_semester","st_vrep","st_observer_name","st_observer1","st_observer2","st_supervisor","st_paragraphs","st_deducted","st_teacher","st_arrtime","st_starttime","st_delay_reason","st_delay_rep","st_decision","st_reason","monitor_name"];
  const data = {};
  allIds.forEach(id=>{ const el=document.getElementById(id); if(el) data[id]=el.value; });
  data.st_date = hijriVal("st_date");

  const sigStudent = f.hasStudentSig ? (document.getElementById("sigStudent")||{}).toDataURL?.() || "" : "";
  const sigMonitor = f.hasMonitorSig ? (document.getElementById("sigMonitor")||{}).toDataURL?.() || "" : "";

  if(!state.monitorReports) state.monitorReports=[];
  state.monitorReports.push({
    id:uid(), type:pledgeType, pledgeTitle:f.title,
    studentName:data.st_name||"", studentCivil:data.st_civil||"", studentSeat:data.st_seat||"",
    grade:data.st_grade||"", subject:data.subject||"", date:data.st_date||"",
    monitorName:data.monitor_name||currentUser.name,
    extraData:data, sigStudent:sigStudent, sigMonitor:sigMonitor,
    savedAt:nowISO()
  });
  saveState(); saveToCloud();
  toast("✅ تم حفظ النموذج بالتوقيعات الإلكترونية");
  navigateTo("monitor_reports");
}

function deleteMonitorReport(id) {
  if(!confirm("حذف هذا التقرير؟")) return;
  var rec = (state.monitorReports||[]).find(r=>r.id===id);
  if(rec && !_monitorVisible(rec)) { toast("لا تملك صلاحية حذف هذا السجل","err"); return; }
  if(_hasPendingApproval("pledge", id) && !confirm("هذا المستند بانتظار اعتماد مدير المدرسة — حذفه سيترك طلب الاعتماد بلا مستند. هل تريد الحذف رغم ذلك؟")) return;
  state.monitorReports = (state.monitorReports||[]).filter(r=>r.id!==id);
  _markDeleted(id);
  saveState(); saveToCloud();
  toast("تم الحذف");
  if(currentPage==="monitor_papers") renderMonitorPapers(document.getElementById("pageContent"));
  else renderMonitorReports(document.getElementById("pageContent"));
}

function printMonitorReport(id) {
  const r = (state.monitorReports||[]).find(x=>x.id===id);
  if(!r) { toast("التقرير غير موجود","err"); return; }

  const pf = PLEDGE_FORMS.find(x=>x.key===r.type);
  const title = r.pledgeTitle || (pf?pf.title:"تقرير مراقب اللجان");
  const subTitle = pf && pf.subTitle ? pf.subTitle : "اختبار نهاية الفصل الدراسي الثاني للعام الدراسي ١٤٤٧هـ";
  const color = pf ? pf.color : "#0D1F3C";

  // بيانات الطالب

// مكتبة التوقيع الإلكتروني (canvas)
// ─────────────────────────────────────────────
function initSigCanvas(canvasId) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.strokeStyle = "#0D1F3C";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    if(e.touches) {
      return [(e.touches[0].clientX - rect.left)*scaleX, (e.touches[0].clientY - rect.top)*scaleY];
    }
    return [(e.clientX - rect.left)*scaleX, (e.clientY - rect.top)*scaleY];
  }

  canvas.onmousedown = canvas.ontouchstart = e => { e.preventDefault(); drawing=true; [lastX,lastY]=getPos(e); };
  canvas.onmousemove = canvas.ontouchmove = e => {
    if(!drawing) return; e.preventDefault();
    const [x,y] = getPos(e);
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
    [lastX,lastY]=[x,y];
  };
  canvas.onmouseup = canvas.ontouchend = canvas.onmouseleave = () => { drawing=false; };
}

function clearSigCanvas(canvasId) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

// — Signature Canvas Logic —
function initSigCanvas(canvasId, clearBtnId, saveBtnId, rowType, rowIdx, formIdx) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext("2d");
  ctx.strokeStyle = "#1a1a2e";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  const fIdx = (formIdx !== undefined) ? formIdx : state.minutesData.activeFormIdx;
  const form = state.minutesData.forms[fIdx];

  function restoreSig(existing) {
    if(existing) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const img=new Image();
      img.onload=()=>ctx.drawImage(img,0,0,canvas.width,canvas.height);
      img.src=existing;
    }
  }

  if(rowType==="row" && form && form.rows[rowIdx]) restoreSig(form.rows[rowIdx].sig);
  if(rowType==="committee" && form && form.committee[rowIdx]) restoreSig(form.committee[rowIdx].sig);

  let drawing=false;
  function getPos(e) {
    const r=canvas.getBoundingClientRect();
    const scaleX=canvas.width/r.width, scaleY=canvas.height/r.height;
    if(e.touches) return {x:(e.touches[0].clientX-r.left)*scaleX, y:(e.touches[0].clientY-r.top)*scaleY};
    return {x:(e.clientX-r.left)*scaleX, y:(e.clientY-r.top)*scaleY};
  }
  function startDraw(e){e.preventDefault();drawing=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function draw(e){e.preventDefault();if(!drawing)return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function endDraw(e){e.preventDefault();drawing=false;}
  canvas.addEventListener("mousedown",startDraw);
  canvas.addEventListener("mousemove",draw);
  canvas.addEventListener("mouseup",endDraw);
  canvas.addEventListener("mouseleave",endDraw);
  canvas.addEventListener("touchstart",startDraw,{passive:false});
  canvas.addEventListener("touchmove",draw,{passive:false});
  canvas.addEventListener("touchend",endDraw,{passive:false});

  const clearBtn=document.getElementById(clearBtnId);
  if(clearBtn) clearBtn.onclick=function(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const f=state.minutesData.forms[fIdx];
    if(rowType==="row"&&f.rows[rowIdx]) f.rows[rowIdx].sig="";
    if(rowType==="committee"&&f.committee[rowIdx]) f.committee[rowIdx].sig="";
    saveMinutes();
  };

  const saveBtn=document.getElementById(saveBtnId);
  if(saveBtn) saveBtn.onclick=function(){
    const dataURL=canvas.toDataURL("image/png");
    const f=state.minutesData.forms[fIdx];
    if(rowType==="row"&&f.rows[rowIdx]) f.rows[rowIdx].sig=dataURL;
    if(rowType==="committee"&&f.committee[rowIdx]) f.committee[rowIdx].sig=dataURL;
    saveMinutes();
    toast("✅ تم حفظ التوقيع");
  };
}

function archiveMinutes(fi) {
  if(fi===undefined) fi = state.minutesData.activeFormIdx||0;
  const md = state.minutesData;
  const form = md.forms[fi];
  if(!form){ toast("لا يوجد محضر للحفظ","err"); return; }

  if(!state.minutesArchive) state.minutesArchive=[];

  // Build snapshot — deep copy without canvas data (keep sig URLs)
  const snapshot = {
    id: "arc_" + Date.now(),
    savedAt: new Date().toISOString(),
    hijriDay: md.hijriDay||"",
    hijriDayNum: md.hijriDayNum||"",
    hijriMonth: md.hijriMonth||"",
    hijriYear: md.hijriYear||"١٤٤٧",
    principal: md.principal||"",
    label: form.label||"محضر",
    rows: form.rows.map(r=>({...r})),
    committee: form.committee.map(c=>({...c})),
  };

  state.minutesArchive.unshift(snapshot); // newest first
  saveMinutes();
  saveToCloud();
  toast("✅ تم حفظ نسخة في التقارير");
}

function restoreAllMinutesSelects(fi) {
  const form = state.minutesData.forms[fi];
  // rows: each tr has 3 selects (subject, grade, teacher)
  const allTrs = document.querySelectorAll("#pageContent tbody tr");
  let rowCount=0, comCount=0;
  // We use canvas IDs to find which table each row belongs to
  form.rows.forEach((r,i)=>{
    const subSel = document.querySelector(`#pageContent [onchange*="forms[${fi}].rows[${i}].subject"]`);
    const grSel  = document.querySelector(`#pageContent [onchange*="forms[${fi}].rows[${i}].grade"]`);
    const tSel   = document.querySelector(`#pageContent [onchange*="forms[${fi}].rows[${i}].teacherName"]`);
    if(subSel && r.subject) subSel.value=r.subject;
    if(grSel  && r.grade)   grSel.value=r.grade;
    if(tSel   && r.teacherName) tSel.value=r.teacherName;
  });
  form.committee.forEach((c,i)=>{
    const cSel = document.querySelector(`#pageContent [onchange*="forms[${fi}].committee[${i}].name"]`);
    if(cSel && c.name) cSel.value=c.name;
  });
}

        <label class="lbl">نص الرسالة</label>
        <textarea id="msgBody" class="inp" rows="5" placeholder="اكتب نص الرسالة هنا..." oninput="updateMsgPreview()" style="font-size:13px;line-height:1.7;resize:vertical"></textarea>

        <button class="btn btn-outline" onclick="_msgTargets=[];_msgType='normal';renderPrincipalCompose(document.getElementById('pageContent'))">🗑️ مسح</button>
      </div>
    </div>
  </div>`;
  setTimeout(updateMsgPreview, 30);
}

function updateMsgPreview(){
  const title=(document.getElementById("msgTitle")||{}).value||"";
  const body=(document.getElementById("msgBody")||{}).value||"";
  const prev=document.getElementById("msgPreview");
  if(!prev) return;
  if(!title&&!body){prev.innerHTML="";return;}
  const mt=_mtOf(_msgType);
  const targets=MSG_TARGETS.filter(t=>_msgTargets.includes(t.role));
  const toStr=targets.length>0?targets.map(t=>t.label).join(" و "):"لم يُحدَّد مستلم";
  prev.innerHTML=`
  <div style="border-radius:12px;border:2px solid ${mt.color}40;overflow:hidden">
    <div style="background:${mt.bg};padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid ${mt.color}30">
      <span style="font-size:20px">${mt.icon}</span>
      <span style="font-weight:800;color:${mt.color};font-size:13px">${mt.label}</span>
      <span style="margin-right:auto;font-size:11px;color:var(--muted)">إلى: ${toStr}</span>
    </div>
    <div style="padding:13px 16px;background:#fff">
      ${title?`<p style="font-weight:800;color:var(--navy);font-size:14px;margin-bottom:6px">${title}</p>`:""}
      <p style="font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap">${body}</p>
      <p style="font-size:11px;color:var(--muted);margin-top:8px">من: ${currentUser?currentUser.name:""} · الآن</p>
    </div>
  </div>`;
}

function sendPrincipalMsg(){
  const title=(document.getElementById("msgTitle")||{}).value.trim();
  const body=(document.getElementById("msgBody")||{}).value.trim();
  if(!title){toast("أدخل عنوان الرسالة","err");return;}
  if(!body){toast("أدخل نص الرسالة","err");return;}
  if(_msgTargets.length===0){toast("اختر مستلماً على الأقل","err");return;}
  const mt=_mtOf(_msgType);
  const msgId="msg_"+Date.now();
  const ts=nowISO();
  if(!state.principalMessages) state.principalMessages=[];
  if(!state.inbox) state.inbox=[];

  state.principalMessages.unshift({
    id:msgId, ts, title, body,
    type:_msgType, typeLabel:mt.label, typeIcon:mt.icon, typeColor:mt.color,
    targets:[..._msgTargets],
    targetLabels:MSG_TARGETS.filter(t=>_msgTargets.includes(t.role)).map(t=>t.label),
    from:currentUser.name, fromRole:currentUser.role,
    replies:[],
  });

  _msgTargets.forEach(role=>{
    state.inbox.unshift({
      id:"inb_"+Date.now()+"_"+role, msgId, ts,
      title, body,
      type:_msgType, typeLabel:mt.label, typeIcon:mt.icon, typeColor:mt.color,
      from:currentUser.name, fromRole:currentUser.role,
      to:role, read:false, replies:[],
    });
  });

  saveState(); saveToCloud();
  const toLabel=_msgTargets.length===2?"الجميع":MSG_TARGETS.find(t=>t.role===_msgTargets[0])?.label||"";
  toast(`✅ تم إرسال الرسالة إلى ${toLabel}`);
  _msgTargets=[]; _msgType="normal";
  renderPrincipalCompose(document.getElementById("pageContent"));
}

// ─── sent box (principal) ────────────────────────
function deletePrincipalMessage(id){
  if(!confirm("حذف هذه الرسالة؟")) return;
  state.principalMessages=(state.principalMessages||[]).filter(m=>m.id!==id);
  _markDeleted(id);
  saveState(); saveToCloud();
  renderPrincipalSent(document.getElementById("pageContent"));
}
function renderPrincipalSent(el){
  const msgs=(state.principalMessages||[]);
  const newReplies=msgs.filter(m=>(m.replies||[]).some(r=>!r.readByPrincipal)).length;
  el.innerHTML=`
  <div class="page-wrap">
    <div class="card">
      <div class="card-title" style="margin-bottom:4px">
        <span class="ct-icon">📤</span>الرسائل المُرسَلة
        ${newReplies>0?`<span style="background:#059669;color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:99px;margin-right:8px">${newReplies} رد جديد</span>`:""}
        <span style="margin-right:auto;font-size:11px;color:var(--muted);font-weight:400">${msgs.length} رسالة</span>
      </div>
      ${msgs.length===0
        ?`<div class="empty"><span class="empty-icon">📭</span>لا توجد رسائل مُرسَلة بعد</div>`
        :`<div style="display:flex;flex-direction:column;gap:12px">
          ${msgs.map((m,mi)=>_renderMsgCard(m,mi,"sent")).join("")}
        </div>`}
    </div>

  msgs.forEach(m=>(m.replies||[]).forEach(r=>r.readByPrincipal=true));

}

// ─── inbox (controller / notifier / principal replies) ──
let _adminNotifType="", _adminNotifRole="";
function _adminNotifFiltered(){
  return (state.inbox||[]).filter(m=>{
    if(_adminNotifType && m.type!==_adminNotifType) return false;
    if(_adminNotifRole && m.to!==_adminNotifRole) return false;
    return true;
  }).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
}
function adminNotifUpdate(field,val){
  if(field==="type") _adminNotifType=val;
  if(field==="role") _adminNotifRole=val;
  _adminNotifRenderResults();
}
function _adminNotifRenderResults(){
  const box=document.getElementById("anf_resultsBox");
  if(!box) return;

function clearMyInbox(){
  if(!confirm("حذف جميع الرسائل الواردة؟")) return;
  (state.inbox||[]).filter(m=>m.to===currentUser.role).forEach(m=>_markDeleted(m.id));
  state.inbox=state.inbox.filter(m=>m.to!==currentUser.role);
  saveState(); saveToCloud();
  renderInbox(document.getElementById("pageContent"));
  toast("تم مسح صندوق الوارد");
}
function renderInbox(el){
  if(!state.inbox) state.inbox=[];
  const myMsgs=state.inbox.filter(m=>m.to===currentUser.role)
                           .sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const unread=myMsgs.filter(m=>!m.read).length;
  state.inbox.forEach(m=>{if(m.to===currentUser.role) m.read=true;});
  saveState(); saveToCloud();
  setTimeout(()=>updateBell(),50);

  el.innerHTML=`
  <div class="page-wrap">
    <div class="card">
      <div class="card-title" style="margin-bottom:4px">
        <span class="ct-icon">🔔</span>التنبيهات والرسائل الواردة
        ${unread>0?`<span style="background:#EF4444;color:#fff;font-size:11px;font-weight:800;padding:2px 10px;border-radius:99px;margin-right:8px">${unread} جديد</span>`:""}
        <span style="margin-right:auto;font-size:11px;color:var(--muted);font-weight:400">${myMsgs.length} رسالة</span>
      </div>
      ${myMsgs.length===0
        ?`<div class="empty"><span class="empty-icon">📭</span>لا توجد رسائل واردة</div>`
        :`<div style="display:flex;flex-direction:column;gap:12px">
          ${myMsgs.map((m,mi)=>_renderMsgCard(m,mi,"inbox")).join("")}
        </div>`}
      ${myMsgs.length>0?`<div style="margin-top:14px;text-align:left">
        <button class="btn btn-outline btn-sm" style="color:var(--red);border-color:var(--red)"
          onclick="clearMyInbox()">🗑️ مسح الكل</button>
      </div>`:""}
    </div>
  </div>`;
}

// ─── unified message card with reply thread ──────
function _renderMsgCard(m, mi, view){
  const mt=_mtOf(m.type);
  const replies=m.replies||[];
  const newReplies=view==="sent"?replies.filter(r=>!r.readByPrincipal).length:0;
  const isInbox=(view==="inbox");
  // الردود مدعومة فقط للرسائل المرتبطة بمحادثة فعلية (مرسلة عبر مدير المدرسة)؛
  // التنبيهات التلقائية (مثل اعتماد مستند) إشعارات أحادية الاتجاه بلا قناة رد محدّدة
  const canReply=isInbox?!!m.msgId:true;
  const toStr=(m.targetLabels||[]).join(" و ");
  const replyBoxId=`replyBox_${view}_${mi}`;
  const taBtnId=`replyToggle_${view}_${mi}`;
  const taId=`replyTA_${view}_${mi}`;

  // build reply thread
  const threadHtml=replies.length===0?"":replies.map(r=>{
    const isMine=(isInbox&&r.fromRole===currentUser.role)||(!isInbox&&r.fromRole==="principal");
    return `
    <div style="display:flex;gap:0;${isMine?'justify-content:flex-start;flex-direction:row-reverse':''}">
      <div style="width:24px;flex-shrink:0;display:flex;justify-content:center;padding-top:4px">
        <div style="width:2px;background:${mt.color}25;min-height:100%"></div>
      </div>
      <div style="flex:1;background:${isMine?'#f0f4ff':'#f8f9fc'};border-radius:10px;padding:9px 13px;margin-bottom:5px;border:1px solid ${isMine?'#c7d4ff':'var(--border)'}">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap">
          <span style="font-weight:800;color:var(--navy);font-size:12px">${esc(r.from)}</span>
          ${isMine?`<span style="background:#DBEAFE;color:#1E40AF;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700">أنت</span>`:`<span style="background:#D1FAE5;color:#059669;border-radius:99px;padding:1px 7px;font-size:10px;font-weight:700">رد وارد ↩️</span>`}
          <span style="margin-right:auto;font-size:10px;color:var(--muted)">${fmt(r.ts)}</span>
        </div>
        <p style="font-size:13px;color:var(--text);line-height:1.65;white-space:pre-wrap;margin:0">${esc(r.body)}</p>
      </div>
    </div>`;
  }).join("");

  return `
  <div id="msgCard_${view}_${mi}" style="border-radius:13px;border:2px solid ${mt.color}30;overflow:hidden;transition:box-shadow .2s" onmouseover="this.style.boxShadow='var(--sh2)'" onmouseout="this.style.boxShadow='none'">

    <!-- ── header ── -->
    <div style="background:${mt.bg};padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid ${mt.color}20">
      <span style="font-size:20px">${mt.icon}</span>
      <span style="font-weight:800;color:${mt.color};font-size:13px">${mt.label}</span>
      ${isInbox
        ?`<span style="font-size:11px;color:var(--mid)">من: <b>${esc(m.from)}</b></span>`
        :`<span style="background:rgba(0,0,0,.07);border-radius:99px;padding:2px 9px;font-size:11px;font-weight:600;color:var(--mid)">إلى: ${toStr}</span>`}
      ${replies.length>0?`<span style="background:${mt.color}20;color:${mt.color};border-radius:99px;padding:2px 9px;font-size:11px;font-weight:700;border:1px solid ${mt.color}40">${replies.length} ${replies.length===1?'رد':'ردود'}</span>`:""}
      ${newReplies>0?`<span style="background:#059669;color:#fff;border-radius:99px;padding:2px 9px;font-size:10px;font-weight:800">↩️ رد جديد</span>`:""}
      <span style="margin-right:auto;font-size:11px;color:var(--muted)">${fmt(m.ts)}</span>
      ${!isInbox?`<button class="del-btn" title="حذف" onclick="deletePrincipalMessage('${m.id}')">✕</button>`:""}
    </div>

    <!-- ── original message body ── -->
    <div style="padding:13px 16px;background:#fff;border-bottom:${replies.length?'1px solid var(--border)':'none'}">
      <p style="font-weight:800;color:var(--navy);font-size:15px;margin-bottom:7px">${esc(m.title)}</p>
      <p style="font-size:13px;color:var(--text);line-height:1.75;white-space:pre-wrap">${esc(m.body)}</p>
    </div>

    <!-- ── reply thread ── -->
    ${replies.length>0?`<div style="padding:10px 16px 4px;background:#fafbfd">${threadHtml}</div>`:""}

    <!-- ── reply action bar ── -->
    ${canReply?`<div style="padding:10px 14px;background:#f4f6fb;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px">
      <div id="${replyBoxId}" style="display:none">
        <textarea id="${taId}" class="inp" rows="3"
          placeholder="اكتب ردك هنا..." style="font-size:13px;line-height:1.65;resize:vertical;margin-bottom:8px"></textarea>
        <div style="display:flex;gap:8px">
          <button class="btn btn-navy btn-sm" onclick="_submitReply('${m.msgId||m.id||""}','${view}',${mi})">↩️ إرسال الرد</button>
          <button class="btn btn-outline btn-sm" onclick="
            document.getElementById('${replyBoxId}').style.display='none';
            document.getElementById('${taBtnId}').style.display='flex';
          ">إلغاء</button>
        </div>
      </div>
      <button id="${taBtnId}" class="btn btn-outline btn-sm" style="align-self:flex-start;display:flex;align-items:center;gap:6px"
        onclick="
          document.getElementById('${replyBoxId}').style.display='block';
          this.style.display='none';
          setTimeout(()=>document.getElementById('${taId}').focus(),40);
        ">
        ↩️ رد على الرسالة
      </button>
    </div>`:""}
  </div>`;
}

// ─── submit a reply ──────────────────────────────
function _submitReply(msgId, view, mi){
  const ta=document.getElementById(`replyTA_${view}_${mi}`);
  if(!ta) return;
  const body=ta.value.trim();
  if(!body){toast("اكتب نص الرد","err");return;}

  const reply={
    id:"rep_"+Date.now(),
    ts:nowISO(),
    body,
    from:currentUser.name,
    fromRole:currentUser.role,
    readByPrincipal:(view==="sent"), // sent = principal replying = auto-read
  };

  if(!state.principalMessages) state.principalMessages=[];
  if(!state.inbox) state.inbox=[];

  // Add to principalMessages entry
  const pm=state.principalMessages.find(m=>m.id===msgId);
  if(pm){ if(!pm.replies) pm.replies=[]; pm.replies.push(reply); }

  // Add to inbox entry
  const inb=state.inbox.find(m=>(m.msgId===msgId||m.id===msgId) && m.to===currentUser.role);
  if(inb){ if(!inb.replies) inb.replies=[]; inb.replies.push(reply); }

  // If replying from inbox → create notification for principal (فقط لو كانت الرسالة جزءاً من محادثة فعلية أرسلها مدير المدرسة)
  if(view==="inbox" && pm){
    state.inbox.unshift({
      id:"inb_rep_"+Date.now(),
      msgId,
      ts:nowISO(),
      title:"↩️ رد على: "+((pm&&pm.title)||"رسالتك"),
      body,
      type:"info", typeLabel:"رد وارد", typeIcon:"↩️", typeColor:"#059669",
      from:currentUser.name, fromRole:currentUser.role,
      to:"principal", read:false, isReply:true, replies:[],
    });
  }

  saveState(); saveToCloud();
  ta.value="";
  document.getElementById(`replyBox_${view}_${mi}`).style.display="none";
  const btn=document.getElementById(`replyToggle_${view}_${mi}`);
  if(btn) btn.style.display="flex";
  toast("✅ تم إرسال الرد");

  // Re-render the card in place
  const cardEl=document.getElementById(`msgCard_${view}_${mi}`);
  if(cardEl){
    const src=(view==="sent")?(state.principalMessages||[])
              :(state.inbox||[]).filter(m=>m.to===currentUser.role).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
    const msg=src[mi];
    if(msg) cardEl.outerHTML=_renderMsgCard(msg,mi,view);
  }
}

// ─── bell ────────────────────────────────────────
function getUnreadCount(){
  if(!currentUser) return 0;
  return (state.inbox||[]).filter(m=>m.to===currentUser.role && !m.read).length;
}

function updateBell(){
  const btn=document.getElementById("bellBtn");
  const badge=document.getElementById("bellBadge");
  if(!btn||!badge) return;
  if(currentUser && ["controller","notifier","principal"].includes(currentUser.role)){
    btn.style.display="flex";
    btn.style.alignItems="center";
    btn.style.justifyContent="center";
    const cnt=getUnreadCount();
    if(cnt>0){
      badge.style.display="flex";
      badge.textContent=cnt>9?"9+":cnt;
    } else {
      badge.style.display="none";
    }
  } else {
    btn.style.display="none";
  }
}

function refreshBellAfterLoad(){
  if(currentUser){renderNav();updateBell();}
}

function _saveDashData() {
  const payload = {
    schoolName: state.schoolName||"متابعة سير الاختبارات",
    bundles:    state.bundles||[],
    stages:     state.stages||[],
    savedAt:    Date.now(),
  };
  try { localStorage.setItem("__dashData", JSON.stringify(payload)); } catch(e){}
}

function _saveDashLogo() {
  // الشعار يُحفظ مرة واحدة فقط (لا يتغير)
  try {
    if(!localStorage.getItem("__dashLogo")) {
      localStorage.setItem("__dashLogo", LOGO_SRC);
    }
  } catch(e){}
}

function openExternalDashboard() {
  _saveDashData();
  _saveDashLogo(); // حفظ الشعار مرة واحدة
  const win = window.open("","_blank","width=1920,height=1080");
  win.document.write(`<!DOCTYPE html>

<style>

@keyframes sIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.tc-subject{font-size:17px;font-weight:900;line-height:1.2}
.tc-grade{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600}
.tc-pct{font-size:22px;font-weight:900;line-height:1;flex-shrink:0}
.tc-bar{height:5px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-bottom:6px}

.tc-stages{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px}
.tc-pill{border-radius:99px;padding:3px 8px;font-size:10px;font-weight:600}

.tc-meta{display:flex;gap:8px;font-size:10px;color:var(--muted);flex-wrap:wrap;align-items:center}

  animation:pop .4s cubic-bezier(.68,-.55,.27,1.55);flex-shrink:0}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

/* subject row */
.subj-row{background:var(--glass);border:1px solid var(--border);border-radius:11px;
  padding:8px 11px;flex:1;min-height:0;border-right-width:4px;
  display:flex;flex-direction:column;justify-content:space-between;

@keyframes fUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sr-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sr-name{flex:1;font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:9px;color:var(--muted);margin-top:1px}
.sr-chip{border-radius:6px;padding:2px 8px;font-size:9px;font-weight:800;flex-shrink:0}

.ticker{height:var(--ticker-h);flex-shrink:0;display:flex;align-items:center;gap:10px;

.ticker-lbl{font-size:9px;font-weight:800;color:var(--gold);white-space:nowrap;

.ticker-track{flex:1;overflow:hidden}

@keyframes tScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.t-item{font-size:10px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
.t-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.rbadge{position:fixed;bottom:8px;left:12px;z-index:99;background:rgba(0,0,0,.55);

  color:var(--muted);backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px}

  animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
</style>
</head>

<div class="shell">

\x3cscript\x3e
const COLORS=['#3B82F6','#8B5CF6','#06B6D4','#F59E0B','#EF4444','#10B981','#F97316','#22C55E','#A855F7','#6366F1'];
const sc=i=>COLORS[i%COLORS.length];
function loadD(){try{const r=localStorage.getItem('__dashData');return r?JSON.parse(r):null;}catch(e){return null;}}
function tick(){
  const n=new Date();
  document.getElementById('clk').textContent=n.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('dLbl').textContent=n.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
tick();setInterval(tick,1000);
;(function(){const c=document.getElementById('parts'),pal=['#3B82F6','#8B5CF6','#F2B830','#10B981','#F97316'];
for(let i=0;i<28;i++){const d=document.createElement('div');d.className='particle';
const s=[5,7,9,11][i%4];Object.assign(d.style,{width:s+'px',height:s+'px',left:Math.random()*100+'%',
background:pal[i%5],animationDuration:(9+Math.random()*16)+'s',animationDelay:(Math.random()*20)+'s'});c.appendChild(d);}})();
function pct(b,st){return b.stage<0||!st.length?0:Math.round(((b.stage+1)/st.length)*100);}
function sName(b,st){return b.stage<0?'لم تبدأ':(st[b.stage]||'—');}
function isDone(b,st){return st.length>0&&b.stage===st.length-1;}
function render(){
  const D=loadD();
  if(!D){document.getElementById('sName').textContent='لا توجد بيانات';return;}
  const bu=D.bundles||[],st=D.stages||[],today=new Date().toISOString().slice(0,10);
  // الشعار يُقرأ من مفتاح منفصل لتجنب تضخيم البيانات
  try{const logo=localStorage.getItem('__dashLogo');if(logo)document.getElementById('logo').src=logo;}catch(e){}
  document.getElementById('sName').textContent=D.schoolName;
  const total=bu.length,done=bu.filter(b=>isDone(b,st)).length,
        inP=bu.filter(b=>b.stage>=0&&!isDone(b,st)).length,
        newB=bu.filter(b=>b.stage<0).length,
        papers=bu.reduce((a,b)=>a+b.count,0),
        ovPct=total?Math.round((done/total)*100):0;
  document.getElementById('statsRow').innerHTML=\`
    <div class="stat"><span class="stat-icon">📚</span><div><div class="stat-val" style="color:#3B82F6">\${total}</div><div class="stat-lbl">إجمالي المظاريف</div></div></div>
    <div class="stat"><span class="stat-icon">✅</span><div><div class="stat-val" style="color:#10B981">\${done}</div><div class="stat-lbl">مكتملة</div></div></div>
    <div class="stat"><span class="stat-icon">⏳</span><div><div class="stat-val" style="color:#F59E0B">\${inP}</div><div class="stat-lbl">قيد التنفيذ</div></div></div>
    <div class="stat"><span class="stat-icon">🆕</span><div><div class="stat-val" style="color:#64748B">\${newB}</div><div class="stat-lbl">جديدة</div></div></div>
    <div class="stat"><span class="stat-icon">📄</span><div><div class="stat-val" style="color:#8B5CF6">\${papers}</div><div class="stat-lbl">إجمالي الأوراق</div></div></div>\`;
  setTimeout(()=>{document.getElementById('pFill').style.width=ovPct+'%';document.getElementById('pPct').textContent=ovPct+'%';},150);
  const todayB=bu.filter(b=>b.examDate===today),tEl=document.getElementById('todayP');
  if(!todayB.length){
    tEl.innerHTML=\`<div class="panel-hdr"><span style="font-size:18px">📅</span><h2>اختبارات اليوم</h2><span class="panel-badge">0 مادة</span></div><div class="empty"><span>📅</span><p>لا توجد اختبارات اليوم</p></div>\`;
  }else{
    const cards=todayB.map((b,i)=>{
      const p=pct(b,st),col=b.stage<0?'#64748B':sc(b.stage),dn=isDone(b,st),sn=sName(b,st);
      const pills=st.map((s,si)=>{const a=si===b.stage,ps=si<b.stage,bg=(a||ps)?sc(si):'rgba(255,255,255,.07)',tx=(a||ps)?'#fff':'rgba(255,255,255,.22)';
        return \`<span class="tc-pill \${a?'active':''}" style="background:\${bg};color:\${tx}">\${s}</span>\`;}).join('');
      return \`<div class="today-card" style="border-right-color:\${col};animation-delay:\${i*90}ms">
        <div class="tc-top"><div><div class="tc-subject">\${b.subject}</div>\${b.grade?\`<div class="tc-grade">\${b.grade}</div>\`:''}</div>
          \${dn?\`<div class="done-badge">✅</div>\`:\`<div class="tc-pct" style="color:\${col}">\${p}%</div>\`}</div>
        <div class="tc-bar"><div class="tc-bar-fill" style="background:\${col};width:\${p}%"></div></div>
        <div class="tc-stages">\${pills}</div>
        <div class="tc-meta"><span>📄 \${b.count} ورقة</span>
          \${b.examStart?\`<span>🕐 \${b.examStart}\${b.examEnd?' — '+b.examEnd:''}</span>\`:''}
          \${b.examHall?\`<span>🏫 \${b.examHall}</span>\`:''}
          <span class="tc-status" style="background:\${col}22;color:\${col};border:1px solid \${col}55">\${sn}</span></div></div>\`;}).join('');
    tEl.innerHTML=\`<div class="panel-hdr"><span style="font-size:18px">📅</span><h2>اختبارات اليوم</h2><span class="panel-badge">\${todayB.length} مادة</span></div><div class="panel-body">\${cards}</div>\`;
  }
  const map={};bu.forEach(b=>{if(!map[b.subject])map[b.subject]={subject:b.subject,bundles:[]};map[b.subject].bundles.push(b);});
  const subjs=Object.values(map),sEl=document.getElementById('subjP');
  if(!subjs.length){
    sEl.innerHTML=\`<div class="panel-hdr"><span style="font-size:18px">📊</span><h2>سير ورقة الاختبار</h2><span class="panel-badge">0</span></div><div class="empty"><span>📊</span><p>لا توجد بيانات</p></div>\`;
  }else{
    const rows=subjs.map((sm,i)=>{
      const bArr=sm.bundles,mx=Math.max(...bArr.map(b=>b.stage)),
            p=st.length?Math.max(0,Math.round(((mx+1)/st.length)*100)):0,
            col=mx<0?'#64748B':sc(mx),dn=bArr.every(b=>isDone(b,st))&&st.length>0,
            sn=mx<0?'لم تبدأ':(st[mx]||'—'),tp=bArr.reduce((a,b)=>a+b.count,0);
      const dots=st.map((s,si)=>\`<div class="sr-dot" title="\${s}" style="background:\${si<=mx?sc(si):'rgba(255,255,255,.07)'}"></div>\`).join('');
      return \`<div class="subj-row" style="border-right-color:\${col};animation-delay:\${i*55}ms">
        <div class="sr-top"><div style="flex:1;min-width:0"><div class="sr-name">\${sm.subject}</div><div class="sr-meta">\${bArr.length} مظروف · \${tp} ورقة</div></div>
          \${dn?\`<span class="sr-chip" style="background:#10B98120;color:#10B981;border:1px solid #10B98144">✅ مكتمل</span>\`
              :\`<span class="sr-chip" style="background:\${col}20;color:\${col};border:1px solid \${col}44">\${sn}</span>\`}</div>
        <div class="sr-bar"><div class="sr-fill" style="background:\${col};width:\${p}%"></div></div>
        <div class="sr-dots">\${dots}</div></div>\`;}).join('');
    sEl.innerHTML=\`<div class="panel-hdr"><span style="font-size:18px">📊</span><h2>سير ورقة الاختبار</h2><span class="panel-badge">\${subjs.length} مادة</span></div><div class="panel-body">\${rows}</div>\`;
  }
  const tItems=bu.map(b=>{const col=b.stage<0?'#64748B':sc(b.stage);
    return \`<span class="t-item"><span class="t-dot" style="background:\${col}"></span><strong>\${b.subject}</strong>\${b.grade?' ('+b.grade+')':''} — \${sName(b,st)} · \${b.count} ورقة</span><span style="color:rgba(255,255,255,.1)">◆</span>\`;}).join('');
  document.getElementById('tkr').innerHTML=tItems+tItems;
}
render();
let cd=30;
const cdEl=document.getElementById('cd');
setInterval(()=>{cd--;if(cdEl)cdEl.textContent=cd;if(cd<=0){cd=30;render();}},1000);
\x3c/script\x3e
</body></html>`);
  win.document.close();
}

// ── INIT ─────────────────────────────────────────
// 1) Load localStorage FIRST so state is populated before anything renders
loadState();
renderLoginDemos();
migrateLegacyPasswords();

(async function() {
  // 2) Then try to sync from cloud (may overwrite with newer data)
  try {
    var ldg = document.getElementById("loadingMsg");
    if(ldg){ ldg.style.display="flex"; }
    await loadFromCloud();
    if(ldg){ ldg.style.display="none"; }
    await migrateLegacyPasswords();
    // After cloud load, also persist to localStorage so next refresh is instant
    saveState();
    refreshBellAfterLoad();
  } catch(e) {
    var ldg = document.getElementById("loadingMsg");
    if(ldg) ldg.style.display="none";
    console.warn("Cloud load failed, using local:", e.message);
  }

  // 3) Restore session
  try {
    var raw = sessionStorage.getItem("examSession");
    if(!raw) raw = localStorage.getItem("examSession_backup");
    if(raw) {
      var sess = JSON.parse(raw);
      var allU = (state.users && state.users.length) ? state.users : DEFAULT_USERS;
      var found = null;
      for(var i=0;i<allU.length;i++){ if(allU[i].username===sess.username){found=allU[i];break;} }
      if(found) enterShell(found, sess.lastPage||null);
    }
  } catch(e){}
})();
